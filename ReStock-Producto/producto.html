<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle de lote — ReStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Newsreader', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            paper: '#FDFBF7',
            navy: '#1A3C6E',
            'navy-dark': '#142d54',
            gold: '#E8A020',
            'gold-light': '#FEF3DC',
            ink: '#1A1A1A',
            muted: '#5C5C5C',
            warm: '#E8E4DC',
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .font-serif, h1, h2, h3 { font-family: 'Newsreader', Georgia, serif; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body class="bg-paper text-ink antialiased">

  <!-- NAV -->
  <header class="sticky top-0 z-50 bg-paper/95 backdrop-blur-sm border-b border-warm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center gap-6">
      <a href="index.html" class="font-serif italic text-xl font-semibold text-navy flex-shrink-0 hover:opacity-80 transition-opacity duration-150">ReStock</a>
      <nav class="hidden md:flex items-center gap-1 flex-1">
        <a href="marketplace.html" class="px-3 py-1.5 text-sm text-muted hover:text-ink transition-colors duration-150 cursor-pointer">Explorar lotes</a>
      </nav>
      <div class="hidden md:flex items-center gap-4 ml-auto" id="navAuth">
        <a href="login.html" class="text-sm text-muted hover:text-ink transition-colors duration-150 cursor-pointer">Entrar</a>
        <a href="publicar.html" class="px-4 py-2 rounded-md bg-navy text-white text-sm font-medium hover:bg-navy-dark transition-colors duration-150 cursor-pointer">Publicar lote</a>
      </div>
    </div>
  </header>

  <!-- BREADCRUMB -->
  <div class="border-b border-warm bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center gap-2 text-xs text-muted">
      <a href="marketplace.html" class="hover:text-ink transition-colors duration-150 cursor-pointer">Explorar lotes</a>
      <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      <span id="breadcrumbTitle" class="text-ink truncate max-w-[200px]">Cargando…</span>
    </div>
  </div>

  <!-- PRODUCT NOT FOUND -->
  <div id="notFound" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 text-center">
    <div class="font-serif text-5xl font-semibold text-warm mb-4">—</div>
    <p class="text-base font-medium text-ink mb-1">Lote no encontrado</p>
    <p class="text-sm text-muted mb-6">Este lote puede haber sido retirado o la URL es incorrecta.</p>
    <a href="marketplace.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-md bg-navy text-white text-sm font-medium hover:bg-navy-dark transition-colors duration-150 cursor-pointer">← Ver todos los lotes</a>
  </div>

  <!-- PRODUCT DETAIL -->
  <div id="productDetail" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">
    <div class="grid lg:grid-cols-[1fr_380px] gap-10 lg:gap-14 items-start">

      <!-- LEFT: image + description -->
      <div>
        <!-- Image -->
        <div class="aspect-[4/3] rounded-xl overflow-hidden bg-warm mb-6">
          <img id="productImg" src="" alt="" class="w-full h-full object-cover" />
        </div>

        <!-- Title + meta (mobile) -->
        <div class="lg:hidden mb-6">
          <div class="flex items-start justify-between gap-3 mb-3">
            <h1 id="productTitleM" class="font-serif text-2xl font-semibold text-ink leading-snug flex-1"></h1>
            <div id="productPriceM" class="font-serif text-3xl font-semibold text-navy flex-shrink-0"></div>
          </div>
          <div id="productMetaM" class="flex flex-wrap items-center gap-2 mb-4"></div>
          <div id="mobileCTA"></div>
        </div>

        <!-- Description -->
        <div class="border-t border-warm pt-6">
          <h2 class="font-serif text-lg font-semibold text-ink mb-3">Descripción del lote</h2>
          <p id="productDesc" class="text-sm text-muted leading-relaxed"></p>
        </div>

        <!-- Details table -->
        <div class="border-t border-warm mt-6 pt-6">
          <h2 class="font-serif text-lg font-semibold text-ink mb-4">Detalles</h2>
          <dl id="productDetails" class="grid grid-cols-2 gap-x-8 gap-y-3 text-sm"></dl>
        </div>

        <!-- Similar products -->
        <div class="border-t border-warm mt-8 pt-8">
          <h2 class="font-serif text-lg font-semibold text-ink mb-4">Más lotes similares</h2>
          <div id="similarGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
        </div>
      </div>

      <!-- RIGHT: sticky sidebar (desktop) -->
      <aside class="hidden lg:block sticky top-20">
        <div class="bg-white border border-warm rounded-xl p-6 space-y-5">

          <!-- Title + price -->
          <div>
            <h1 id="productTitle" class="font-serif text-xl font-semibold text-ink leading-snug mb-3"></h1>
            <div id="productMeta" class="flex flex-wrap items-center gap-2 mb-4"></div>
            <div id="productPrice" class="font-serif text-4xl font-semibold text-navy"></div>
            <p id="productUnit" class="text-xs text-muted mt-1"></p>
          </div>

          <div class="border-t border-warm"></div>

          <!-- Commission breakdown -->
          <div>
            <p class="text-xs font-semibold text-muted uppercase tracking-wider mb-3">Comisión ReStock</p>
            <div id="commissionInfo" class="space-y-1.5 text-sm"></div>
          </div>

          <div class="border-t border-warm"></div>

          <!-- CTA buttons -->
          <div id="desktopCTA" class="space-y-2"></div>

          <!-- Seller -->
          <div class="border-t border-warm pt-5">
            <p class="text-xs font-semibold text-muted uppercase tracking-wider mb-3">Vendedor</p>
            <div id="sellerCard"></div>
          </div>

        </div>
      </aside>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-init.js"></script>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script>
    // ── Auth nav ───────────────────────────────────────────────────────────────
    (async () => {
      const user = await getUser();
      if (user) {
        document.getElementById('navAuth').innerHTML = `
          <a href="mensajes.html" class="text-sm text-muted hover:text-ink transition-colors duration-150 cursor-pointer">Mensajes</a>
          <a href="perfil.html" class="flex items-center gap-2 cursor-pointer group">
            <div class="w-7 h-7 rounded-full bg-navy text-white text-xs font-semibold flex items-center justify-center">${user.name[0].toUpperCase()}</div>
          </a>
          <a href="publicar.html" class="px-4 py-2 rounded-md bg-navy text-white text-sm font-medium hover:bg-navy-dark transition-colors duration-150 cursor-pointer">Publicar lote</a>
        `;
      }
    })();

    // ── Load product ───────────────────────────────────────────────────────────
    const id = parseInt(getParam('id'));
    const product = PRODUCTS.find(p => p.id === id);
    (async () => {

    if (!product) {
      document.getElementById('notFound').classList.remove('hidden');
    } else {
      document.getElementById('productDetail').classList.remove('hidden');

      // Breadcrumb
      document.getElementById('breadcrumbTitle').textContent = product.title;
      document.title = product.title + ' — ReStock';

      // Image
      const img = document.getElementById('productImg');
      img.src = product.images[0];
      img.alt = product.title;

      // Condition badge helper
      const cond = CONDITIONS[product.condition];
      const condBadge = `<span class="text-xs px-2 py-0.5 rounded-full font-medium" style="background:${cond.bg};color:${cond.color}">${cond.label}</span>`;
      const catObj = CATEGORIES.find(c => c.id === product.category);
      const metaHtml = `
        ${condBadge}
        <span class="text-xs text-muted">${product.quantity} ${product.unit}</span>
        ${catObj ? `<span class="text-xs px-2 py-0.5 rounded-full bg-warm text-muted font-medium">${catObj.name}</span>` : ''}
      `;

      // Desktop sidebar
      document.getElementById('productTitle').textContent = product.title;
      document.getElementById('productMeta').innerHTML = metaHtml;
      document.getElementById('productPrice').textContent = product.price.toLocaleString('es-ES') + '€';
      document.getElementById('productUnit').textContent = `${(product.price / product.quantity).toFixed(2).replace('.',',')}€ por ${product.unit.slice(0,-1) || 'unidad'}`;

      // Mobile
      document.getElementById('productTitleM').textContent = product.title;
      document.getElementById('productPriceM').textContent = product.price.toLocaleString('es-ES') + '€';
      document.getElementById('productMetaM').innerHTML = metaHtml;

      // Commission
      let rate = product.price >= 1000 ? 3 : product.price >= 500 ? 4 : 5;
      const commAmt = Math.round(product.price * rate / 100);
      document.getElementById('commissionInfo').innerHTML = `
        <div class="flex justify-between text-muted">
          <span>Comisión vendedor (${rate}%)</span>
          <span>${commAmt.toLocaleString('es-ES')}€</span>
        </div>
        <div class="flex justify-between text-muted">
          <span>Comisión comprador (${rate}%)</span>
          <span>${commAmt.toLocaleString('es-ES')}€</span>
        </div>
        <div class="flex justify-between font-medium text-ink border-t border-warm pt-1.5 mt-1.5">
          <span>Recibirás</span>
          <span class="text-navy">${(product.price - commAmt).toLocaleString('es-ES')}€</span>
        </div>
      `;

      // CTA buttons
      const user = await getUser();
      const isOwner = user && (user.id === product.seller.id || user.isAdmin);
      const ctaHtml = isOwner
        ? `<div class="px-3 py-2 rounded-md border border-warm text-xs text-muted text-center">Tu lote</div>
           <a href="perfil.html" class="block w-full text-center py-2.5 rounded-md border border-warm text-sm font-medium text-muted hover:bg-warm/40 transition-colors duration-150 cursor-pointer">Ver mis lotes</a>`
        : `<button onclick="contactSeller()" class="w-full py-2.5 rounded-md bg-navy text-white text-sm font-semibold hover:bg-navy-dark transition-colors duration-150 cursor-pointer">Contactar vendedor →</button>
           <p class="text-xs text-muted text-center">Mensajería directa · sin intermediarios</p>`;
      document.getElementById('desktopCTA').innerHTML = ctaHtml;
      document.getElementById('mobileCTA').innerHTML = isOwner
        ? `<div class="px-3 py-2 rounded-md border border-warm text-xs text-muted text-center">Tu lote</div>`
        : `<button onclick="contactSeller()" class="w-full py-2.5 rounded-md bg-navy text-white text-sm font-semibold hover:bg-navy-dark transition-colors duration-150 cursor-pointer">Contactar vendedor →</button>`;

      // Seller card
      const s = product.seller;
      document.getElementById('sellerCard').innerHTML = `
        <div class="flex items-center gap-3 mb-3">
          <div class="w-9 h-9 rounded-full bg-navy text-white text-sm font-semibold flex items-center justify-center flex-shrink-0">${s.name[0].toUpperCase()}</div>
          <div>
            <p class="text-sm font-medium text-ink">${s.name}</p>
            <p class="text-xs text-muted">${s.city} · desde ${s.since}</p>
          </div>
        </div>
        <div class="flex items-center gap-3 text-xs text-muted">
          <span class="flex items-center gap-1">
            <svg class="w-3.5 h-3.5 text-gold flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
            ${s.rating} (${s.reviews} reseñas)
          </span>
        </div>
      `;

      // Description
      document.getElementById('productDesc').textContent = product.description;

      // Details table
      const created = new Date(product.created).toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' });
      document.getElementById('productDetails').innerHTML = `
        <div><dt class="text-xs text-muted uppercase tracking-wider mb-0.5">Categoría</dt><dd class="font-medium text-sm text-ink">${catObj ? catObj.name : product.category}</dd></div>
        <div><dt class="text-xs text-muted uppercase tracking-wider mb-0.5">Condición</dt><dd>${condBadge}</dd></div>
        <div><dt class="text-xs text-muted uppercase tracking-wider mb-0.5">Cantidad</dt><dd class="font-medium text-sm text-ink">${product.quantity} ${product.unit}</dd></div>
        <div><dt class="text-xs text-muted uppercase tracking-wider mb-0.5">Precio/ud</dt><dd class="font-medium text-sm text-ink">${(product.price / product.quantity).toFixed(2).replace('.',',')}€</dd></div>
        <div><dt class="text-xs text-muted uppercase tracking-wider mb-0.5">Ubicación</dt><dd class="font-medium text-sm text-ink">${s.city}</dd></div>
        <div><dt class="text-xs text-muted uppercase tracking-wider mb-0.5">Publicado</dt><dd class="font-medium text-sm text-ink">${created}</dd></div>
        <div><dt class="text-xs text-muted uppercase tracking-wider mb-0.5">Visitas</dt><dd class="font-medium text-sm text-ink">${product.views}</dd></div>
      `;

      // Similar products
      const similar = PRODUCTS.filter(p => p.active && p.id !== product.id && p.category === product.category).slice(0, 3);
      const fallback = PRODUCTS.filter(p => p.active && p.id !== product.id).slice(0, 3);
      const shown = similar.length ? similar : fallback;
      document.getElementById('similarGrid').innerHTML = shown.map(p => `
        <a href="producto.html?id=${p.id}" class="group flex flex-col bg-white border border-warm rounded-lg overflow-hidden hover:border-navy/30 hover:shadow-sm transition-all duration-200 cursor-pointer">
          <div class="aspect-[4/3] bg-warm overflow-hidden">
            <img src="${p.images[0]}" alt="${p.title}" class="w-full h-full object-cover group-hover:scale-[1.02] transition-transform duration-300" loading="lazy" />
          </div>
          <div class="p-3">
            <p class="text-xs font-medium text-ink line-clamp-2 group-hover:text-navy transition-colors duration-150 mb-1">${p.title}</p>
            <p class="font-serif text-sm font-semibold text-navy">${p.price.toLocaleString('es-ES')}€</p>
          </div>
        </a>
      `).join('');
    }
    })();

    // ── Contact seller ─────────────────────────────────────────────────────────
    async function contactSeller() {
      const user = await getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      window.location.href = `mensajes.html?product=${product.id}`;
    }
  </script>
</body>
</html>
