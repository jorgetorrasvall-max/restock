<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle de lote — ReStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Newsreader', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            paper: '#FDFBF7',
            navy: '#1A3C6E',
            'navy-dark': '#142d54',
            gold: '#E8A020',
            'gold-light': '#FEF3DC',
            ink: '#1A1A1A',
            muted: '#5C5C5C',
            warm: '#E8E4DC',
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .font-serif, h1, h2, h3 { font-family: 'Newsreader', Georgia, serif; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body class="bg-paper text-ink antialiased">

  <!-- NAV -->
  <header class="sticky top-0 z-50 bg-paper/95 backdrop-blur-sm border-b border-warm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center gap-6">
      <a href="index.html" class="font-serif italic text-xl font-semibold text-navy flex-shrink-0 hover:opacity-80 transition-opacity duration-150">ReStock</a>
      <nav class="hidden md:flex items-center gap-1 flex-1">
        <a href="marketplace.html" class="px-3 py-1.5 text-sm text-muted hover:text-ink transition-colors duration-150 cursor-pointer">Explorar lotes</a>
      </nav>
      <div class="hidden md:flex items-center gap-4 ml-auto" id="navAuth">
        <a href="login.html" class="text-sm text-muted hover:text-ink transition-colors duration-150 cursor-pointer">Entrar</a>
        <a href="publicar.html" class="px-4 py-2 rounded-md bg-navy text-white text-sm font-medium hover:bg-navy-dark transition-colors duration-150 cursor-pointer">Publicar lote</a>
      </div>
    </div>
  </header>

  <!-- BREADCRUMB -->
  <div class="border-b border-warm bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center gap-2 text-xs text-muted">
      <a href="marketplace.html" class="hover:text-ink transition-colors duration-150 cursor-pointer">Explorar lotes</a>
      <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      <span id="breadcrumbTitle" class="text-ink truncate max-w-[200px]">Cargando…</span>
    </div>
  </div>

  <!-- PRODUCT NOT FOUND -->
  <div id="notFound" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 text-center">
    <div class="font-serif text-5xl font-semibold text-warm mb-4">—</div>
    <p class="text-base font-medium text-ink mb-1">Lote no encontrado</p>
    <p class="text-sm text-muted mb-6">Este lote puede haber sido retirado o la URL es incorrecta.</p>
    <a href="marketplace.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-md bg-navy text-white text-sm font-medium hover:bg-navy-dark transition-colors duration-150 cursor-pointer">← Ver todos los lotes</a>
  </div>

  <!-- PRODUCT DETAIL -->
  <div id="productDetail" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">
    <div class="grid lg:grid-cols-[1fr_380px] gap-10 lg:gap-14 items-start">

      <!-- LEFT: image + description -->
      <div>
        <!-- Image -->
        <div class="aspect-[4/3] rounded-xl overflow-hidden bg-warm mb-6">
          <img id="productImg" src="" alt="" class="w-full h-full object-cover" />
        </div>

        <!-- Title + meta (mobile) -->
        <div class="lg:hidden mb-6">
          <div class="flex items-start justify-between gap-3 mb-3">
            <h1 id="productTitleM" class="font-serif text-2xl font-semibold text-ink leading-snug flex-1"></h1>
            <div id="productPriceM" class="font-serif text-3xl font-semibold text-navy flex-shrink-0"></div>
          </div>
          <div id="productMetaM" class="flex flex-wrap items-center gap-2 mb-4"></div>
          <div id="mobileCTA"></div>
        </div>

        <!-- Description -->
        <div class="border-t border-warm pt-6">
          <h2 class="font-serif text-lg font-semibold text-ink mb-3">Descripción del lote</h2>
          <p id="productDesc" class="text-sm text-muted leading-relaxed"></p>
        </div>

        <!-- Details table -->
        <div class="border-t border-warm mt-6 pt-6">
          <h2 class="font-serif text-lg font-semibold text-ink mb-4">Detalles</h2>
          <dl id="productDetails" class="grid grid-cols-2 gap-x-8 gap-y-3 text-sm"></dl>
        </div>

        <!-- Similar products -->
        <div class="border-t border-warm mt-8 pt-8">
          <h2 class="font-serif text-lg font-semibold text-ink mb-4">Más lotes similares</h2>
          <div id="similarGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
        </div>
      </div>

      <!-- RIGHT: sticky sidebar (desktop) -->
      <aside class="hidden lg:block sticky top-20">
        <div class="bg-white border border-warm rounded-xl p-6 space-y-5">

          <!-- Title + price -->
          <div>
            <h1 id="productTitle" class="font-serif text-xl font-semibold text-ink leading-snug mb-3"></h1>
            <div id="productMeta" class="flex flex-wrap items-center gap-2 mb-4"></div>
            <div id="productPrice" class="font-serif text-4xl font-semibold text-navy"></div>
            <p id="productUnit" class="text-xs text-muted mt-1"></p>
          </div>

          <div class="border-t border-warm"></div>

          <!-- Commission breakdown -->
          <div>
            <p class="text-xs font-semibold text-muted uppercase tracking-wider mb-3">Comisión ReStock</p>
            <div id="commissionInfo" class="space-y-1.5 text-sm"></div>
          </div>

          <div class="border-t border-warm"></div>

          <!-- CTA buttons -->
          <div id="desktopCTA" class="space-y-2"></div>

          <!-- Seller -->
          <div class="border-t border-warm pt-5">
            <p class="text-xs font-semibold text-muted uppercase tracking-wider mb-3">Vendedor</p>
            <div id="sellerCard"></div>
          </div>

        </div>
      </aside>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-init.js"></script>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script>
    // ── Load product from Supabase ─────────────────────────────────────────────
    const productId = getParam('id');

    async function loadProduct() {
      if (!productId) return null;
      const { data, error } = await _supabase
        .from('products')
        .select('*, profiles(id, name, city, rating, reviews, created_at)')
        .eq('id', productId)
        .single();
      if (error) { console.error(error); return null; }
      return data;
    }

    (async () => {
      const product = await loadProduct();

      if (!product) {
        document.getElementById('notFound').classList.remove('hidden');
        return;
      }

      document.getElementById('productDetail').classList.remove('hidden');
      document.getElementById('breadcrumbTitle').textContent = product.title;
      document.title = product.title + ' — ReStock';

      const img = document.getElementById('productImg');
      img.src = product.images?.[0] || '';
      img.alt = product.title;

      const cond = CONDITIONS[product.condition];
      const catObj = CATEGORIES.find(c => c.id === product.category);
      const condBadge = `<span class="text-xs px-2 py-0.5 rounded-full font-medium" style="background:${cond.bg};color:${cond.color}">${cond.label}</span>`;
      const metaHtml = `
        ${condBadge}
        <span class="text-xs text-muted">${product.quantity} ${product.unit}</span>
        ${catObj ? `<span class="text-xs px-2 py-0.5 rounded-full bg-warm text-muted font-medium">${catObj.name}</span>` : ''}
      `;

      // Rellenar campos del sidebar/header (IDs existentes en el HTML)
      const titleEl = document.getElementById('productTitle');
      const titleMEl = document.getElementById('productTitleM');
      const metaEl = document.getElementById('productMeta');
      const metaMEl = document.getElementById('productMetaM');
      const priceEl = document.getElementById('productPrice');
      const priceMEl = document.getElementById('productPriceM');
      const unitEl = document.getElementById('productUnit');
      const descEl = document.getElementById('productDesc');

      if (titleEl) titleEl.textContent = product.title;
      if (titleMEl) titleMEl.textContent = product.title;
      if (metaEl) metaEl.innerHTML = metaHtml;
      if (metaMEl) metaMEl.innerHTML = metaHtml;
      if (priceEl) priceEl.textContent = formatPrice(product.price);
      if (priceMEl) priceMEl.textContent = formatPrice(product.price);
      if (unitEl) unitEl.textContent = `${product.quantity} ${product.unit}`;
      if (descEl) descEl.textContent = product.description || '';

      // Comisión — getCommission devuelve { buyer, seller, total } (porcentajes)
      const comm = getCommission(product.price);
      const buyerFee = Math.round(product.price * comm.buyer / 100);
      const buyerTotal = product.price + buyerFee;
      const commEl = document.getElementById('commissionInfo');
      if (commEl) {
        commEl.innerHTML = `
          <div class="flex justify-between text-sm">
            <span class="text-muted">Precio del lote</span>
            <span class="font-medium">${formatPrice(product.price)}</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-muted">Comisión ReStock (${comm.buyer}%)</span>
            <span class="font-medium text-gold">+${formatPrice(buyerFee)}</span>
          </div>
          <div class="flex justify-between text-sm font-semibold border-t border-warm pt-2 mt-2">
            <span>Total a pagar</span>
            <span class="text-navy">${formatPrice(buyerTotal)}</span>
          </div>
        `;
      }

      // CTA — estado SOLD o botón comprar
      const ctaHtml = product.sold
        ? `<div class="w-full py-3 px-4 rounded-md bg-warm text-center text-sm font-semibold text-muted">
             Este lote ya ha sido vendido
           </div>`
        : `<button id="btnComprar"
             class="w-full py-3 px-4 rounded-md bg-navy text-white text-sm font-semibold hover:bg-navy-dark transition-colors duration-150 cursor-pointer"
             onclick="handleComprar()">
             Comprar este lote
           </button>`;

      const desktopCTA = document.getElementById('desktopCTA');
      const mobileCTA = document.getElementById('mobileCTA');
      if (desktopCTA) desktopCTA.innerHTML = ctaHtml;
      if (mobileCTA) mobileCTA.innerHTML = ctaHtml;

      // Seller card
      const seller = product.profiles;
      const sellerEl = document.getElementById('sellerCard');
      if (seller && sellerEl) {
        sellerEl.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-navy text-white text-sm font-semibold flex items-center justify-center flex-shrink-0">
              ${seller.name[0].toUpperCase()}
            </div>
            <div>
              <p class="text-sm font-semibold text-ink">${seller.name}</p>
              <p class="text-xs text-muted">${seller.city || ''} · ★ ${seller.rating} (${seller.reviews} reseñas)</p>
            </div>
          </div>
        `;
      }

      // Detalles
      const detailsEl = document.getElementById('productDetails');
      if (detailsEl) {
        detailsEl.innerHTML = `
          <dt class="text-muted">Categoría</dt><dd class="font-medium">${catObj?.name || product.category}</dd>
          <dt class="text-muted">Condición</dt><dd class="font-medium">${cond?.label || product.condition}</dd>
          <dt class="text-muted">Cantidad</dt><dd class="font-medium">${product.quantity} ${product.unit}</dd>
          <dt class="text-muted">Publicado</dt><dd class="font-medium">${daysAgo(product.created_at)}</dd>
        `;
      }

      // Lotes similares desde Supabase
      const { data: similar } = await _supabase
        .from('products')
        .select('id, title, price, condition, images, quantity, unit')
        .eq('category', product.category)
        .eq('active', true)
        .neq('id', productId)
        .limit(3);

      const similarGrid = document.getElementById('similarGrid');
      if (similarGrid && similar?.length) {
        similarGrid.innerHTML = similar.map(p => `
          <a href="producto.html?id=${p.id}" class="group flex flex-col bg-white border border-warm rounded-lg overflow-hidden hover:border-navy/30 hover:shadow-sm transition-all duration-200 cursor-pointer">
            <div class="aspect-[4/3] bg-warm overflow-hidden">
              <img src="${p.images?.[0] || ''}" alt="${p.title}" class="w-full h-full object-cover group-hover:scale-[1.02] transition-transform duration-300" loading="lazy" />
            </div>
            <div class="p-3">
              <p class="text-xs font-medium text-ink line-clamp-2 group-hover:text-navy transition-colors duration-150 mb-1">${p.title}</p>
              <p class="font-serif text-sm font-semibold text-navy">${formatPrice(p.price)}</p>
            </div>
          </a>
        `).join('');
      }

      // Incrementar vistas
      await _supabase.rpc('increment_views', { product_id: productId });
    })();

    async function handleComprar() {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      const btn = document.getElementById('btnComprar');
      if (btn) { btn.disabled = true; btn.textContent = 'Redirigiendo a pago…'; }

      const { data, error } = await _supabase.functions.invoke('create-checkout-session', {
        body: { product_id: productId }
      });

      if (error || !data?.url) {
        showToast('Error al iniciar el pago. Inténtalo de nuevo.', 'error');
        if (btn) { btn.disabled = false; btn.textContent = 'Comprar este lote'; }
        return;
      }

      window.location.href = data.url;
    }
  </script>
</body>
</html>
