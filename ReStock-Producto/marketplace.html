<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorar lotes — ReStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Newsreader', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            paper: '#FDFBF7',
            navy: '#1A3C6E',
            'navy-dark': '#142d54',
            gold: '#E8A020',
            'gold-light': '#FEF3DC',
            ink: '#1A1A1A',
            muted: '#5C5C5C',
            warm: '#E8E4DC',
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .font-serif, h1, h2, h3 { font-family: 'Newsreader', Georgia, serif; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
    .sidebar-cat.active { color: #1A3C6E; font-weight: 600; background: rgba(26,60,110,0.06); }
    .cond-badge-A { background: #ecfdf5; color: #059669; }
    .cond-badge-B { background: #eff6ff; color: #0284c7; }
    .cond-badge-C { background: #fffbeb; color: #d97706; }
    .cond-badge-D { background: #fef2f2; color: #dc2626; }
    #mobileFilters { display: none; }
    #mobileFilters.open { display: block; }
  </style>
</head>
<body class="bg-paper text-ink antialiased">

  <!-- NAV -->
  <header class="sticky top-0 z-50 bg-paper/95 backdrop-blur-sm border-b border-warm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center gap-6">
      <a href="index.html" class="font-serif italic text-xl font-semibold text-navy flex-shrink-0 hover:opacity-80 transition-opacity duration-150">ReStock</a>
      <nav class="hidden md:flex items-center gap-1 flex-1">
        <a href="marketplace.html" class="px-3 py-1.5 text-sm text-ink font-medium transition-colors duration-150">Explorar lotes</a>
        <a href="index.html#como-funciona" class="px-3 py-1.5 text-sm text-muted hover:text-ink transition-colors duration-150 cursor-pointer">Cómo funciona</a>
        <a href="index.html#comisiones" class="px-3 py-1.5 text-sm text-muted hover:text-ink transition-colors duration-150 cursor-pointer">Comisiones</a>
      </nav>
      <div class="hidden md:flex items-center gap-4 ml-auto" id="navAuth">
        <a href="login.html" class="text-sm text-muted hover:text-ink transition-colors duration-150 cursor-pointer">Entrar</a>
        <a href="publicar.html" class="px-4 py-2 rounded-md bg-navy text-white text-sm font-medium hover:bg-navy-dark transition-colors duration-150 cursor-pointer">Publicar lote</a>
      </div>
      <button id="mobileMenuBtn" class="md:hidden ml-auto p-2 text-muted hover:text-ink cursor-pointer" aria-label="Abrir menú">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </header>

  <!-- PAGE HEADER -->
  <div class="border-b border-warm bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5">
      <div class="flex flex-col sm:flex-row sm:items-center gap-3">
        <div class="flex-1">
          <h1 class="font-serif text-2xl font-semibold text-ink">Lotes disponibles</h1>
          <p id="resultCount" class="text-sm text-muted mt-0.5">Cargando…</p>
        </div>
        <!-- Search bar -->
        <div class="flex items-center gap-2 bg-paper border border-warm rounded-lg p-1 focus-within:border-navy/40 focus-within:ring-2 focus-within:ring-navy/10 transition-all duration-150 w-full sm:w-72">
          <svg class="w-4 h-4 text-muted ml-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
          <input id="searchInput" type="text" placeholder="Buscar lotes…" class="flex-1 text-sm py-2 focus:outline-none bg-transparent text-ink placeholder:text-muted" />
        </div>
        <!-- Mobile filter toggle -->
        <button id="filterToggle" class="sm:hidden flex items-center gap-2 px-3 py-2 border border-warm rounded-lg text-sm text-muted bg-white cursor-pointer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"/></svg>
          Filtros
        </button>
      </div>

      <!-- Sort + active filters -->
      <div class="flex items-center gap-3 mt-3 flex-wrap">
        <select id="sortSelect" class="text-xs border border-warm rounded-md px-2 py-1.5 bg-white text-muted focus:outline-none focus:border-navy/40 cursor-pointer">
          <option value="recent">Más recientes</option>
          <option value="price-asc">Precio: menor primero</option>
          <option value="price-desc">Precio: mayor primero</option>
          <option value="views">Más vistos</option>
        </select>
        <div id="activeFilters" class="flex items-center gap-2 flex-wrap"></div>
      </div>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex gap-8">

      <!-- SIDEBAR (desktop) -->
      <aside class="hidden lg:block w-52 flex-shrink-0">
        <div class="sticky top-20 space-y-6">

          <!-- Categories -->
          <div>
            <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-2">Categoría</p>
            <nav class="space-y-0.5" id="catNav">
              <button data-cat="" class="sidebar-cat active w-full text-left px-3 py-2 rounded-md text-sm transition-colors duration-150 cursor-pointer hover:bg-warm/60">Todos los lotes</button>
            </nav>
          </div>

          <div class="border-t border-warm"></div>

          <!-- Condition -->
          <div>
            <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-2">Condición</p>
            <div class="space-y-1.5" id="condFilters">
              <label class="flex items-center gap-2.5 cursor-pointer group">
                <input type="checkbox" value="A" class="cond-check rounded border-warm text-navy focus:ring-navy/20 cursor-pointer" checked />
                <span class="text-xs px-2 py-0.5 rounded-full cond-badge-A font-medium">Nuevo con etiqueta</span>
              </label>
              <label class="flex items-center gap-2.5 cursor-pointer group">
                <input type="checkbox" value="B" class="cond-check rounded border-warm text-navy focus:ring-navy/20 cursor-pointer" checked />
                <span class="text-xs px-2 py-0.5 rounded-full cond-badge-B font-medium">Nuevo sin etiqueta</span>
              </label>
              <label class="flex items-center gap-2.5 cursor-pointer group">
                <input type="checkbox" value="C" class="cond-check rounded border-warm text-navy focus:ring-navy/20 cursor-pointer" checked />
                <span class="text-xs px-2 py-0.5 rounded-full cond-badge-C font-medium">Buen estado</span>
              </label>
              <label class="flex items-center gap-2.5 cursor-pointer group">
                <input type="checkbox" value="D" class="cond-check rounded border-warm text-navy focus:ring-navy/20 cursor-pointer" checked />
                <span class="text-xs px-2 py-0.5 rounded-full cond-badge-D font-medium">Defecto visible</span>
              </label>
            </div>
          </div>

          <div class="border-t border-warm"></div>

          <!-- Price range -->
          <div>
            <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-2">Precio máximo</p>
            <div class="space-y-1.5">
              <button data-maxprice="" class="price-filter w-full text-left px-3 py-1.5 rounded-md text-sm text-muted hover:bg-warm/60 transition-colors duration-150 cursor-pointer">Sin límite</button>
              <button data-maxprice="500" class="price-filter w-full text-left px-3 py-1.5 rounded-md text-sm text-muted hover:bg-warm/60 transition-colors duration-150 cursor-pointer">Hasta 500€</button>
              <button data-maxprice="1000" class="price-filter w-full text-left px-3 py-1.5 rounded-md text-sm text-muted hover:bg-warm/60 transition-colors duration-150 cursor-pointer">Hasta 1.000€</button>
              <button data-maxprice="2000" class="price-filter w-full text-left px-3 py-1.5 rounded-md text-sm text-muted hover:bg-warm/60 transition-colors duration-150 cursor-pointer">Hasta 2.000€</button>
            </div>
          </div>

        </div>
      </aside>

      <!-- MOBILE FILTERS -->
      <div id="mobileFilters" class="lg:hidden fixed inset-0 z-40 bg-paper overflow-y-auto">
        <div class="flex items-center justify-between px-4 py-3 border-b border-warm">
          <h2 class="font-serif text-lg font-semibold text-ink">Filtros</h2>
          <button id="closeFilters" class="p-2 text-muted hover:text-ink cursor-pointer" aria-label="Cerrar">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="px-4 py-5 space-y-6">
          <div>
            <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-2">Categoría</p>
            <nav class="space-y-0.5" id="catNavMobile"></nav>
          </div>
          <div class="border-t border-warm"></div>
          <div>
            <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-2">Condición</p>
            <div class="space-y-2" id="condFiltersMobile"></div>
          </div>
          <div class="border-t border-warm"></div>
          <div>
            <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-2">Precio máximo</p>
            <div class="space-y-1" id="priceFiltersMobile"></div>
          </div>
          <button id="applyFilters" class="w-full py-2.5 bg-navy text-white text-sm font-medium rounded-md hover:bg-navy-dark transition-colors duration-150 cursor-pointer">Aplicar filtros</button>
        </div>
      </div>

      <!-- PRODUCT GRID -->
      <main class="flex-1 min-w-0">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4"></div>
        <div id="emptyState" class="hidden text-center py-20">
          <div class="font-serif text-5xl font-semibold text-warm mb-4">—</div>
          <p class="text-base font-medium text-ink mb-1">Sin resultados</p>
          <p class="text-sm text-muted">Prueba con otros filtros o categoría.</p>
          <button onclick="resetFilters()" class="mt-4 text-sm text-navy font-medium hover:underline cursor-pointer">Limpiar filtros</button>
        </div>
      </main>

    </div>
  </div>

  <!-- FOOTER -->
  <footer class="border-t border-warm mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col sm:flex-row items-center justify-between gap-3">
      <a href="index.html" class="font-serif italic text-base font-semibold text-navy hover:opacity-80 transition-opacity duration-150">ReStock</a>
      <p class="text-xs text-muted">© 2026 ReStock · Barcelona · <a href="mailto:hola@restock.es" class="hover:text-ink transition-colors duration-150">hola@restock.es</a></p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    let state = {
      cat: getParam('cat') || '',
      q: getParam('q') || '',
      conds: ['A','B','C','D'],
      maxPrice: null,
      sort: 'recent',
    };

    // ── Init nav auth ──────────────────────────────────────────────────────────
    (function initNav() {
      const user = getUser();
      if (user) {
        const nav = document.getElementById('navAuth');
        nav.innerHTML = `
          <a href="mensajes.html" class="text-sm text-muted hover:text-ink transition-colors duration-150 cursor-pointer">Mensajes</a>
          <a href="perfil.html" class="flex items-center gap-2 cursor-pointer group">
            <div class="w-7 h-7 rounded-full bg-navy text-white text-xs font-semibold flex items-center justify-center flex-shrink-0">${user.avatar}</div>
            <span class="text-sm text-muted group-hover:text-ink transition-colors duration-150 hidden lg:block">${user.name.split('—')[0].trim()}</span>
          </a>
          <a href="publicar.html" class="px-4 py-2 rounded-md bg-navy text-white text-sm font-medium hover:bg-navy-dark transition-colors duration-150 cursor-pointer">Publicar lote</a>
        `;
      }
    })();

    // ── Build sidebar ──────────────────────────────────────────────────────────
    function buildSidebar() {
      const cats = [{ id: '', name: 'Todos los lotes' }, ...CATEGORIES];

      function catBtn(c, mobile) {
        const active = state.cat === c.id;
        return `<button data-cat="${c.id}" class="sidebar-cat${active ? ' active' : ''} w-full text-left px-3 py-2 rounded-md text-sm transition-colors duration-150 cursor-pointer hover:bg-warm/60 ${mobile ? '' : ''}">${c.name}</button>`;
      }

      document.getElementById('catNav').innerHTML = cats.map(c => catBtn(c, false)).join('');
      document.getElementById('catNavMobile').innerHTML = cats.map(c => catBtn(c, true)).join('');

      const condHtml = CONDITIONS
        ? Object.entries(CONDITIONS).map(([k,v]) => `
          <label class="flex items-center gap-2.5 cursor-pointer">
            <input type="checkbox" value="${k}" class="cond-check-m rounded border-warm cursor-pointer" ${state.conds.includes(k) ? 'checked' : ''} />
            <span class="text-xs px-2 py-0.5 rounded-full font-medium" style="background:${v.bg};color:${v.color}">${v.label}</span>
          </label>`).join('')
        : '';
      document.getElementById('condFiltersMobile').innerHTML = condHtml;

      const priceOpts = [
        { val: '', label: 'Sin límite' },
        { val: '500', label: 'Hasta 500€' },
        { val: '1000', label: 'Hasta 1.000€' },
        { val: '2000', label: 'Hasta 2.000€' },
      ];
      document.getElementById('priceFiltersMobile').innerHTML = priceOpts.map(p =>
        `<button data-maxprice-m="${p.val}" class="price-filter-m w-full text-left px-3 py-1.5 rounded-md text-sm ${state.maxPrice === (p.val||null) ? 'text-navy font-semibold' : 'text-muted'} hover:bg-warm/60 transition-colors duration-150 cursor-pointer">${p.label}</button>`
      ).join('');
    }

    // ── Render products ────────────────────────────────────────────────────────
    function condBadge(key) {
      const c = CONDITIONS[key];
      return `<span class="text-xs px-2 py-0.5 rounded-full font-medium" style="background:${c.bg};color:${c.color}">${c.label}</span>`;
    }

    function priceStr(n) {
      return n.toLocaleString('es-ES') + '€';
    }

    function renderProducts() {
      let items = PRODUCTS.filter(p => p.active);

      if (state.cat) items = items.filter(p => p.category === state.cat);
      if (state.q) {
        const q = state.q.toLowerCase();
        items = items.filter(p => p.title.toLowerCase().includes(q) || p.description.toLowerCase().includes(q));
      }
      if (state.conds.length < 4) items = items.filter(p => state.conds.includes(p.condition));
      if (state.maxPrice) items = items.filter(p => p.price <= state.maxPrice);

      if (state.sort === 'price-asc') items.sort((a,b) => a.price - b.price);
      else if (state.sort === 'price-desc') items.sort((a,b) => b.price - a.price);
      else if (state.sort === 'views') items.sort((a,b) => b.views - a.views);
      else items.sort((a,b) => new Date(b.created) - new Date(a.created));

      const count = items.length;
      document.getElementById('resultCount').textContent = count === 0
        ? 'Ningún lote encontrado'
        : count === 1 ? '1 lote disponible' : `${count} lotes disponibles`;

      const grid = document.getElementById('productGrid');
      const empty = document.getElementById('emptyState');

      if (count === 0) {
        grid.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }
      grid.classList.remove('hidden');
      empty.classList.add('hidden');

      grid.innerHTML = items.map(p => `
        <a href="producto.html?id=${p.id}" class="group flex flex-col bg-white border border-warm rounded-xl overflow-hidden hover:border-navy/30 hover:shadow-sm transition-all duration-200 cursor-pointer">
          <div class="relative aspect-[4/3] bg-warm overflow-hidden">
            <img src="${p.images[0]}" alt="${p.title}" class="w-full h-full object-cover group-hover:scale-[1.02] transition-transform duration-300" loading="lazy" />
          </div>
          <div class="p-4 flex flex-col flex-1">
            <div class="flex items-start justify-between gap-2 mb-2">
              <h2 class="font-serif text-base font-semibold text-ink leading-snug group-hover:text-navy transition-colors duration-150 line-clamp-2">${p.title}</h2>
              <div class="font-serif text-lg font-semibold text-navy flex-shrink-0">${priceStr(p.price)}</div>
            </div>
            <div class="flex items-center gap-2 mb-3 flex-wrap">
              ${condBadge(p.condition)}
              <span class="text-xs text-muted">${p.quantity} ${p.unit}</span>
            </div>
            <div class="mt-auto flex items-center justify-between">
              <div class="flex items-center gap-1.5">
                <div class="w-5 h-5 rounded-full bg-navy text-white text-[10px] font-semibold flex items-center justify-center flex-shrink-0">${p.seller.avatar}</div>
                <span class="text-xs text-muted truncate max-w-[120px]">${p.seller.name}</span>
              </div>
              <div class="flex items-center gap-1 text-xs text-muted">
                <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                ${p.views}
              </div>
            </div>
          </div>
        </a>
      `).join('');
    }

    // ── Active filter chips ────────────────────────────────────────────────────
    function renderFilterChips() {
      const chips = [];
      if (state.cat) {
        const c = CATEGORIES.find(c => c.id === state.cat);
        if (c) chips.push(`<button onclick="setCat('')" class="flex items-center gap-1 px-2.5 py-1 rounded-full bg-navy/8 border border-navy/20 text-xs text-navy font-medium cursor-pointer hover:bg-navy/15 transition-colors duration-150">${c.name} <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg></button>`);
      }
      if (state.q) {
        chips.push(`<button onclick="setQ('')" class="flex items-center gap-1 px-2.5 py-1 rounded-full bg-navy/8 border border-navy/20 text-xs text-navy font-medium cursor-pointer hover:bg-navy/15 transition-colors duration-150">"${state.q}" <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg></button>`);
      }
      if (state.maxPrice) {
        chips.push(`<button onclick="setMaxPrice(null)" class="flex items-center gap-1 px-2.5 py-1 rounded-full bg-navy/8 border border-navy/20 text-xs text-navy font-medium cursor-pointer hover:bg-navy/15 transition-colors duration-150">Hasta ${priceStr(state.maxPrice)} <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg></button>`);
      }
      document.getElementById('activeFilters').innerHTML = chips.join('');
    }

    // ── State setters ──────────────────────────────────────────────────────────
    function setCat(val) {
      state.cat = val;
      document.querySelectorAll('.sidebar-cat').forEach(b => b.classList.toggle('active', b.dataset.cat === val));
      refresh();
    }
    function setQ(val) {
      state.q = val;
      document.getElementById('searchInput').value = val;
      refresh();
    }
    function setMaxPrice(val) {
      state.maxPrice = val;
      document.querySelectorAll('.price-filter').forEach(b => {
        const bval = b.dataset.maxprice ? parseInt(b.dataset.maxprice) : null;
        b.classList.toggle('text-navy', bval === val);
        b.classList.toggle('font-semibold', bval === val);
        b.classList.toggle('text-muted', bval !== val);
      });
      refresh();
    }
    function resetFilters() {
      state = { cat: '', q: '', conds: ['A','B','C','D'], maxPrice: null, sort: 'recent' };
      document.getElementById('searchInput').value = '';
      document.getElementById('sortSelect').value = 'recent';
      document.querySelectorAll('.cond-check').forEach(cb => cb.checked = true);
      buildSidebar();
      refresh();
    }
    function refresh() {
      renderProducts();
      renderFilterChips();
    }

    // ── Event listeners ────────────────────────────────────────────────────────
    document.addEventListener('click', e => {
      // Category nav
      const catBtn = e.target.closest('.sidebar-cat');
      if (catBtn) { setCat(catBtn.dataset.cat); return; }
      // Price filter
      const priceBtn = e.target.closest('.price-filter');
      if (priceBtn) {
        const val = priceBtn.dataset.maxprice ? parseInt(priceBtn.dataset.maxprice) : null;
        setMaxPrice(val); return;
      }
    });

    document.getElementById('searchInput').addEventListener('input', e => {
      state.q = e.target.value.trim();
      refresh();
    });

    document.getElementById('sortSelect').addEventListener('change', e => {
      state.sort = e.target.value;
      refresh();
    });

    document.querySelectorAll('.cond-check').forEach(cb => {
      cb.addEventListener('change', () => {
        state.conds = Array.from(document.querySelectorAll('.cond-check:checked')).map(c => c.value);
        refresh();
      });
    });

    // Mobile filters
    document.getElementById('filterToggle').addEventListener('click', () => {
      document.getElementById('mobileFilters').classList.add('open');
    });
    document.getElementById('closeFilters').addEventListener('click', () => {
      document.getElementById('mobileFilters').classList.remove('open');
    });
    document.getElementById('applyFilters').addEventListener('click', () => {
      // Read mobile state
      state.conds = Array.from(document.querySelectorAll('.cond-check-m:checked')).map(c => c.value);
      document.getElementById('mobileFilters').classList.remove('open');
      buildSidebar();
      refresh();
    });
    document.addEventListener('click', e => {
      const mCat = e.target.closest('[data-cat]');
      if (mCat && document.getElementById('catNavMobile').contains(mCat)) {
        document.querySelectorAll('#catNavMobile .sidebar-cat').forEach(b => b.classList.toggle('active', b.dataset.cat === mCat.dataset.cat));
        state.cat = mCat.dataset.cat;
      }
      const mPrice = e.target.closest('[data-maxprice-m]');
      if (mPrice) {
        state.maxPrice = mPrice.dataset.maxpriceM ? parseInt(mPrice.dataset.maxpriceM) : null;
        document.querySelectorAll('.price-filter-m').forEach(b => {
          const bval = b.dataset.maxpriceMM ? parseInt(b.dataset.maxpriceM) : null;
          b.classList.toggle('text-navy', bval === state.maxPrice);
          b.classList.toggle('font-semibold', bval === state.maxPrice);
          b.classList.toggle('text-muted', bval !== state.maxPrice);
        });
      }
    });

    // ── Boot ───────────────────────────────────────────────────────────────────
    if (state.q) document.getElementById('searchInput').value = state.q;
    buildSidebar();
    refresh();
  </script>
</body>
</html>
