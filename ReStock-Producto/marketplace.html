  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3, .font-heading { font-family: 'Lexend', sans-serif; }

    /* Dropdown */
    #dropdownMenu { display: none; }
    #dropdownMenu.open { display: block; }

    /* Mobile nav */
    #mobileNavMenu { display: none; }
    #mobileNavMenu.open { display: block; }

    /* Filters sidebar: hidden on mobile, shown with .open, always visible on lg+ */
    #filtersSidebar { display: none; }
    #filtersSidebar.open { display: block; }
    @media (min-width: 1024px) {
      #filtersSidebar { display: block !important; }
    }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.15); opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast--success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .toast--error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }

    /* Product cards (dynamically generated) */
    .p-card { background: #fff; border-radius: 14px; border: 1px solid #e5e7eb; overflow: hidden; cursor: pointer; transition: box-shadow 0.2s ease, transform 0.2s ease; }
    .p-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .p-card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #f3f4f6; }
    .p-card-body { padding: 14px 16px 16px; }
    .p-card-cat { font-size: 11px; color: #9ca3af; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .p-card-title { font-family: 'Lexend', sans-serif; font-weight: 600; font-size: 14px; line-height: 1.4; color: #111827; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .p-card-price { font-family: 'Lexend', sans-serif; font-weight: 700; font-size: 22px; color: #1A3C6E; margin-bottom: 10px; }
    .p-card-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 4px 8px; font-size: 12px; color: #6b7280; }
    .p-card-meta-dot { color: #d1d5db; }
    .p-cond-badge { position: absolute; top: 10px; right: 10px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .cond-A { color: #059669; background: #ecfdf5; }
    .cond-B { color: #0284c7; background: #eff6ff; }
    .cond-C { color: #d97706; background: #fffbeb; }
    .cond-D { color: #dc2626; background: #fef2f2; }

    /* Filter checkbox custom style */
    .filter-cb { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; font-size: 13px; color: #374151; }
    .filter-cb input[type=checkbox] { accent-color: #1A3C6E; width: 15px; height: 15px; cursor: pointer; }

    /* Scrollbar for sidebar */
    #filtersSidebar::-webkit-scrollbar { width: 4px; }
    #filtersSidebar::-webkit-scrollbar-track { background: transparent; }
    #filtersSidebar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
  </style>
</head>

  <script>
    if (!requireAuth()) throw new Error('Unauthenticated');

    let localProducts = JSON.parse(localStorage.getItem('rs_products') || '[]');
    let allProducts = [...PRODUCTS, ...localProducts];

    // Build category filters
    const catContainer = document.getElementById('catFilters');
    CATEGORIES.forEach(cat => {
      catContainer.innerHTML += `
        <label class="filter-cb">
          <input type="checkbox" id="cat_${cat.id}" value="${cat.id}" />
          <span>${cat.icon} ${cat.name}</span>
        </label>`;
    });

    function getFilters() {
      return {
        cats:     [...document.querySelectorAll('#catFilters input:checked')].map(i => i.value),
        conds:    [...document.querySelectorAll('#cA,#cB,#cC,#cD').values()].filter(i => i.checked).map(i => i.value),
        priceMin: parseFloat(document.getElementById('priceMin').value) || 0,
        priceMax: parseFloat(document.getElementById('priceMax').value) || Infinity,
        city:     document.getElementById('cityFilter').value.trim().toLowerCase(),
      };
    }

    function applySort(arr) {
      const s = document.getElementById('sortSelect').value;
      return [...arr].sort((a, b) => {
        if (s === 'precio-asc')  return a.price - b.price;
        if (s === 'precio-desc') return b.price - a.price;
        if (s === 'vistos')      return b.views - a.views;
        return new Date(b.created) - new Date(a.created);
      });
    }

    function render() {
      const q = new URLSearchParams(location.search).get('q')?.toLowerCase() || '';
      const f = getFilters();

      let filtered = allProducts.filter(p => {
        if (f.cats.length  && !f.cats.includes(p.category))  return false;
        if (f.conds.length && !f.conds.includes(p.condition)) return false;
        if (p.price < f.priceMin || p.price > f.priceMax)    return false;
        if (f.city && !p.seller.city.toLowerCase().includes(f.city)) return false;
        if (q && !p.title.toLowerCase().includes(q) &&
                 !p.description.toLowerCase().includes(q) &&
                 !p.seller.city.toLowerCase().includes(q)) return false;
        return true;
      });
      filtered = applySort(filtered);

      const grid  = document.getElementById('productGrid');
      const empty = document.getElementById('emptyState');
      document.getElementById('resultCount').innerHTML = `<strong>${filtered.length}</strong> lote${filtered.length !== 1 ? 's' : ''}`;
      document.getElementById('activeQuery').textContent = q ? `para "${q}"` : '';

      if (!filtered.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        empty.classList.add('flex');
        return;
      }
      empty.classList.add('hidden');
      empty.classList.remove('flex');

      grid.innerHTML = filtered.map(p => `
        <div class="p-card" onclick="window.location='producto.html?id=${p.id}'" role="link" tabindex="0">
          <div style="position:relative">
            <img class="p-card-img" src="${p.images[0]}" alt="${p.title}" loading="lazy" />
            <span class="p-cond-badge cond-${p.condition}">${CONDITIONS[p.condition].label}</span>
          </div>
          <div class="p-card-body">
            <div class="p-card-cat">${getCategoryName(p.category)}</div>
            <div class="p-card-title">${p.title}</div>
            <div class="p-card-price">${formatPrice(p.price)}</div>
            <div class="p-card-meta">
              <span>${p.quantity} ${p.unit}</span>
              <span class="p-card-meta-dot">·</span>
              <span>${p.seller.name}</span>
              <span class="p-card-meta-dot">·</span>
              <span>${p.seller.city}</span>
              <span style="margin-left:auto;font-size:11px;color:#9ca3af">${daysAgo(p.created)}</span>
            </div>
          </div>
        </div>`).join('');
    }

    document.getElementById('applyFilters').onclick = render;
    document.getElementById('sortSelect').onchange  = render;
    document.getElementById('clearFilters').onclick = () => {
      document.querySelectorAll('#filtersSidebar input[type=checkbox]').forEach(i => i.checked = false);
      document.getElementById('priceMin').value   = '';
      document.getElementById('priceMax').value   = '';
      document.getElementById('cityFilter').value = '';
      history.pushState({}, '', 'marketplace.html');
      render();
    };

    // Mobile filter toggle
    document.getElementById('toggleFilters').onclick = () => {
      document.getElementById('filtersSidebar').classList.toggle('open');
    };

    // Pre-select category from URL
    const catParam = new URLSearchParams(location.search).get('cat');
    if (catParam) {
      const cb = document.getElementById('cat_' + catParam);
      if (cb) cb.checked = true;
    }

    // Keyboard accessibility for cards
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.classList.contains('p-card')) {
        e.target.click();
      }
    });

    render();
  </script>
</body>
</html>
