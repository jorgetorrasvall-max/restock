<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — ReStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    #dropdownMenu { display: none; } #dropdownMenu.open { display: block; }
    #mobileNavMenu { display: none; } #mobileNavMenu.open { display: block; }
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast--success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .toast--error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    .cond-A { color:#059669; background:#ecfdf5; }
    .cond-B { color:#0284c7; background:#eff6ff; }
    .cond-C { color:#d97706; background:#fffbeb; }
    .cond-D { color:#dc2626; background:#fef2f2; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

  <!-- NAV -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-slate-200 h-14">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 h-full flex items-center gap-4">
      <a href="marketplace.html" class="font-bold text-base text-slate-900 flex-shrink-0">ReStock</a>
      <div class="flex-1 max-w-xl hidden sm:block">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
          <input id="navSearch" type="text" placeholder="Buscar lotes…" class="w-full pl-9 pr-4 py-2 rounded-md border border-slate-200 text-sm bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-colors duration-150" />
        </div>
      </div>
      <div class="hidden md:flex items-center gap-2 ml-auto flex-shrink-0">
        <a href="marketplace.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-100 transition-colors duration-150 cursor-pointer">Explorar</a>
        <a href="publicar.html" class="inline-flex items-center gap-1.5 px-4 py-2 rounded-md bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800 transition-colors duration-150 cursor-pointer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Publicar
        </a>
        <div class="relative">
          <button id="userBtn" class="flex items-center gap-2 pl-2 pr-3 py-1.5 rounded-md hover:bg-slate-100 transition-colors duration-150 cursor-pointer">
            <span id="userAvatar" class="w-7 h-7 rounded-full bg-slate-900 text-white text-xs font-bold flex items-center justify-center flex-shrink-0">?</span>
            <span id="userName" class="text-sm font-medium text-slate-700">Entrar</span>
            <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div id="dropdownMenu" class="absolute right-0 top-full mt-1 w-52 bg-white rounded-lg border border-slate-200 py-1 z-50">
            <a href="perfil.html"   class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer">Mi perfil</a>
            <a href="mensajes.html" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer">
              Mensajes
              <span id="msgBadge" class="hidden ml-auto bg-blue-600 text-white text-xs font-bold px-1.5 py-0.5 rounded-full"></span>
            </a>
            <a href="admin.html" id="adminLink" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-900 font-semibold hover:bg-slate-50 cursor-pointer" style="display:none">Panel admin</a>
            <div class="border-t border-slate-100 my-1"></div>
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 cursor-pointer">Cerrar sesión</button>
          </div>
        </div>
      </div>
      <button id="mobileNavToggle" class="md:hidden ml-auto p-2 rounded-md text-slate-500 hover:bg-slate-100 cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobileNavMenu" class="border-t border-slate-200 bg-white">
      <div class="px-4 py-3 space-y-1 max-w-screen-xl mx-auto">
        <a href="marketplace.html" class="block px-3 py-2 rounded-md text-sm text-slate-700 hover:bg-slate-50">Explorar</a>
        <a href="perfil.html"      class="block px-3 py-2 rounded-md text-sm text-slate-700 hover:bg-slate-50">Mi perfil</a>
        <button onclick="logout()" class="block w-full text-left px-3 py-2 rounded-md text-sm text-red-600 hover:bg-red-50 cursor-pointer">Cerrar sesión</button>
      </div>
    </div>
  </nav>

  <div class="pt-14 min-h-screen">
    <div id="adminContent" class="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 py-8"></div>
  </div>

  <div id="toastEl" class="toast"></div>

  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      if (!user.isAdmin) {
        document.getElementById('adminContent').innerHTML = `
          <div class="flex flex-col items-center justify-center py-24 text-center">
            <div class="w-14 h-14 rounded-lg bg-slate-100 flex items-center justify-center mb-5">
              <svg class="w-7 h-7 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
            </div>
            <div class="font-semibold text-slate-900 mb-2">Acceso restringido</div>
            <div class="text-sm text-slate-500 mb-6">Solo jorgetorrasvall@gmail.com puede acceder al panel de administración.</div>
            <a href="marketplace.html" class="px-5 py-2.5 rounded-md bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800 transition-colors duration-150 cursor-pointer">Volver al marketplace</a>
          </div>`;
        return;
      }
      renderAdmin();
    });

    function renderAdmin() {
      const allProducts  = [...PRODUCTS, ...JSON.parse(localStorage.getItem('rs_products') || '[]')];
      const localCount   = JSON.parse(localStorage.getItem('rs_products') || '[]').length;
      const totalGMV     = allProducts.reduce((s, p) => s + p.price, 0);
      const totalViews   = allProducts.reduce((s, p) => s + (p.views || 0), 0);
      const totalRevenue = allProducts.reduce((s, p) => { const c = getCommission(p.price); return s + (p.price * c.total / 100); }, 0);
      const usedCodes    = ALPHA_CODES.filter(c => c.used).length;

      const container = document.getElementById('adminContent');

      // Header
      const header = document.createElement('div');
      header.className = 'flex items-center justify-between mb-8';
      header.innerHTML = `
        <div>
          <h1 class="font-bold text-2xl text-slate-900">Panel de administración</h1>
          <p class="text-sm text-slate-500 mt-0.5">ReStock Beta · Abril 2026 · <span class="text-slate-700 font-medium">jorgetorrasvall@gmail.com</span></p>
        </div>
        <button onclick="clearLocalData()" class="px-4 py-2 rounded-md border border-red-200 text-red-600 text-sm font-medium hover:bg-red-50 transition-colors duration-150 cursor-pointer">
          Limpiar datos locales
        </button>`;
      container.appendChild(header);

      // Stats
      const stats = document.createElement('div');
      stats.className = 'grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8';
      stats.innerHTML = [
        { label: 'Lotes publicados', value: allProducts.length, sub: `+${localCount} nuevos` },
        { label: 'GMV potencial', value: totalGMV.toLocaleString('es-ES') + '€', sub: 'suma de todos los lotes' },
        { label: 'Visitas totales', value: totalViews.toLocaleString('es-ES'), sub: 'en todos los lotes' },
        { label: 'Ingresos estimados', value: totalRevenue.toFixed(0) + '€', sub: 'comisiones si todo vendido' },
      ].map(s => `
        <div class="bg-white rounded-lg border border-slate-200 p-5">
          <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">${s.label}</div>
          <div class="font-bold text-2xl text-slate-900">${s.value}</div>
          <div class="text-xs text-slate-400 mt-1">${s.sub}</div>
        </div>`).join('');
      container.appendChild(stats);

      // Products table
      const productsSection = document.createElement('div');
      productsSection.className = 'bg-white rounded-lg border border-slate-200 mb-6 overflow-hidden';
      productsSection.innerHTML = `
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <h2 class="font-semibold text-slate-900">Todos los lotes (${allProducts.length})</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-slate-100 bg-slate-50">
                <th class="text-left px-5 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Lote</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider hidden md:table-cell">Categoría</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Estado</th>
                <th class="text-right px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">Precio</th>
                <th class="text-right px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider hidden sm:table-cell">Vistas</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider hidden lg:table-cell">Vendedor</th>
                <th class="px-4 py-3"></th>
              </tr>
            </thead>
            <tbody>
              ${allProducts.map(p => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors duration-150">
                  <td class="px-5 py-3.5">
                    <div class="font-medium text-slate-900 text-sm truncate max-w-[200px]">${p.title}</div>
                    <div class="text-xs text-slate-400 mt-0.5">${p.quantity} ${p.unit} · ${daysAgo(p.created)}</div>
                  </td>
                  <td class="px-4 py-3.5 hidden md:table-cell">
                    <span class="text-xs text-slate-600">${getCategoryName(p.category)}</span>
                  </td>
                  <td class="px-4 py-3.5">
                    <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold cond-${p.condition}">${p.condition}</span>
                  </td>
                  <td class="px-4 py-3.5 text-right">
                    <span class="font-semibold text-slate-900">${formatPrice(p.price)}</span>
                  </td>
                  <td class="px-4 py-3.5 text-right hidden sm:table-cell">
                    <span class="text-slate-500">${p.views || 0}</span>
                  </td>
                  <td class="px-4 py-3.5 hidden lg:table-cell">
                    <span class="text-slate-500 text-xs">${p.seller.name}</span>
                  </td>
                  <td class="px-4 py-3.5 text-right">
                    <a href="producto.html?id=${p.id}" class="text-xs text-blue-600 font-medium hover:underline cursor-pointer">Ver →</a>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
      container.appendChild(productsSection);

      // Users + Alpha codes: 2-col
      const bottom = document.createElement('div');
      bottom.className = 'grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8';
      bottom.innerHTML = `
        <!-- Users -->
        <div class="bg-white rounded-lg border border-slate-200 overflow-hidden">
          <div class="px-6 py-4 border-b border-slate-100">
            <h2 class="font-semibold text-slate-900">Usuarios registrados (${MOCK_USERS.length})</h2>
          </div>
          <div class="divide-y divide-slate-50">
            ${MOCK_USERS.map(u => `
              <div class="flex items-center gap-3 px-5 py-3.5">
                <div class="w-8 h-8 rounded-full bg-slate-900 text-white text-xs font-bold flex items-center justify-center flex-shrink-0">${u.avatar}</div>
                <div class="flex-1 min-w-0">
                  <div class="text-sm font-medium text-slate-900 flex items-center gap-1.5">
                    ${u.name}
                    ${u.isFounder ? `<span class="text-[10px] font-semibold text-amber-700 bg-amber-50 border border-amber-200 px-1.5 py-0.5 rounded-full">Fundador</span>` : ''}
                    ${u.isAdmin   ? `<span class="text-[10px] font-semibold text-slate-600 bg-slate-100 px-1.5 py-0.5 rounded-full">Admin</span>` : ''}
                  </div>
                  <div class="text-xs text-slate-400">${u.email} · ${u.city}</div>
                </div>
                <span class="text-xs text-slate-400">${u.type}</span>
              </div>`).join('')}
          </div>
        </div>

        <!-- Alpha codes -->
        <div class="bg-white rounded-lg border border-slate-200 overflow-hidden">
          <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <h2 class="font-semibold text-slate-900">Códigos alpha</h2>
            <span class="text-xs text-slate-500">${usedCodes}/20 usados</span>
          </div>
          <div class="px-5 py-4">
            <div class="h-1.5 rounded-full bg-slate-100 overflow-hidden mb-4">
              <div class="h-full rounded-full bg-blue-600 transition-all duration-700" style="width:${usedCodes / 20 * 100}%"></div>
            </div>
            <div class="grid grid-cols-2 gap-1.5 max-h-64 overflow-y-auto">
              ${ALPHA_CODES.map(c => `
                <div class="flex items-center justify-between px-3 py-2 rounded-md border ${c.used ? 'border-green-200 bg-green-50' : 'border-slate-200 bg-slate-50'}">
                  <span class="font-mono text-xs ${c.used ? 'text-green-700' : 'text-slate-500'}">${c.code.replace('RESTOCK-ALPHA-','')}</span>
                  ${c.used
                    ? `<svg class="w-3.5 h-3.5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.5 12.75l6 6 9-13.5"/></svg>`
                    : `<svg class="w-3.5 h-3.5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>`}
                </div>`).join('')}
            </div>
          </div>
        </div>`;
      container.appendChild(bottom);
    }

    function clearLocalData() {
      if (!confirm('¿Seguro? Esto elimina lotes y conversaciones guardados localmente.')) return;
      localStorage.removeItem('rs_products');
      localStorage.removeItem('rs_conversations');
      showToast('Datos locales eliminados', 'success');
      setTimeout(() => location.reload(), 800);
    }
  </script>
</body>
</html>
