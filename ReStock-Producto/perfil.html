<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil — ReStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    #dropdownMenu { display:none; } #dropdownMenu.open { display:block; }
    #mobileNavMenu { display:none; } #mobileNavMenu.open { display:block; }
    .toast { position:fixed; bottom:20px; right:20px; z-index:9999; padding:10px 16px; border-radius:8px; font-size:13px; font-weight:500; box-shadow:0 2px 12px rgba(0,0,0,0.12); opacity:0; transform:translateY(6px); transition:opacity 0.2s,transform 0.2s; pointer-events:none; }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast--success { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
    .toast--error   { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
    .p-card { background:#fff; border-radius:8px; border:1px solid #e2e8f0; overflow:hidden; cursor:pointer; transition:border-color 0.15s; }
    .p-card:hover { border-color:#94a3b8; }
    .p-card-img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:#f8fafc; }
    .p-card-body { padding:12px 14px 14px; }
    .p-card-title { font-weight:600; font-size:13px; line-height:1.4; color:#0f172a; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .p-card-price { font-weight:700; font-size:17px; color:#0f172a; margin-bottom:6px; }
    .p-card-meta { font-size:11px; color:#64748b; display:flex; justify-content:space-between; }
    .p-cond-badge { position:absolute; top:8px; right:8px; padding:2px 7px; border-radius:4px; font-size:10px; font-weight:600; }
    .cond-A { color:#059669; background:#ecfdf5; }
    .cond-B { color:#0284c7; background:#eff6ff; }
    .cond-C { color:#d97706; background:#fffbeb; }
    .cond-D { color:#dc2626; background:#fef2f2; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

  <!-- NAV -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-slate-200 h-14">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 h-full flex items-center gap-4">
      <a href="marketplace.html" class="font-bold text-sm text-slate-900 flex-shrink-0">ReStock</a>
      <div class="flex-1 max-w-md hidden sm:block">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
          <input id="navSearch" type="text" placeholder="Buscar lotes…" class="w-full pl-9 pr-4 py-1.5 rounded-md border border-slate-200 text-sm bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-colors duration-150" />
        </div>
      </div>
      <div class="hidden md:flex items-center gap-2 ml-auto flex-shrink-0">
        <a href="marketplace.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-100 cursor-pointer">Explorar</a>
        <a href="publicar.html" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-slate-900 text-white text-sm font-medium hover:bg-slate-700 transition-colors duration-150 cursor-pointer">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Publicar
        </a>
        <a href="mensajes.html" class="relative p-2 rounded-md text-slate-500 hover:bg-slate-100 cursor-pointer">
          <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/></svg>
          <span id="msgBadge" class="absolute -top-0.5 -right-0.5 w-3.5 h-3.5 rounded-full bg-red-500 text-white text-[9px] font-bold items-center justify-center" style="display:none"></span>
        </a>
        <div class="relative">
          <button id="userBtn" class="flex items-center gap-2 pl-2 pr-3 py-1.5 rounded-md hover:bg-slate-100 cursor-pointer">
            <span id="userAvatar" class="w-6 h-6 rounded-full bg-slate-900 text-white text-xs font-semibold flex items-center justify-center flex-shrink-0">?</span>
            <span id="userName" class="text-sm text-slate-700">Entrar</span>
            <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div id="dropdownMenu" class="absolute right-0 top-full mt-1 w-48 bg-white rounded-lg border border-slate-200 shadow-lg py-1 z-50">
            <a href="perfil.html"    class="flex items-center gap-2.5 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer">Mi perfil</a>
            <a href="mensajes.html"  class="flex items-center gap-2.5 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer">Mensajes</a>
            <a href="publicar.html"  class="flex items-center gap-2.5 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer">Publicar lote</a>
            <a href="admin.html" id="adminLink" class="flex items-center gap-2.5 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer" style="display:none">Panel admin</a>
            <div class="border-t border-slate-100 my-1"></div>
            <button onclick="logout()" class="w-full flex items-center gap-2.5 px-4 py-2 text-sm text-red-600 hover:bg-red-50 cursor-pointer">Cerrar sesión</button>
          </div>
        </div>
      </div>
      <button id="mobileNavToggle" class="md:hidden ml-auto p-2 rounded-md text-slate-500 hover:bg-slate-100 cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobileNavMenu" class="border-t border-slate-200 bg-white">
      <div class="px-4 py-3 space-y-1 max-w-screen-xl mx-auto">
        <a href="marketplace.html" class="block px-3 py-2 rounded-md text-sm text-slate-700 hover:bg-slate-50">Explorar</a>
        <a href="publicar.html"    class="block px-3 py-2 rounded-md text-sm text-slate-700 hover:bg-slate-50">Publicar lote</a>
        <a href="mensajes.html"    class="block px-3 py-2 rounded-md text-sm text-slate-700 hover:bg-slate-50">Mensajes</a>
        <button onclick="logout()" class="block w-full text-left px-3 py-2 rounded-md text-sm text-red-600 hover:bg-red-50 cursor-pointer">Cerrar sesión</button>
      </div>
    </div>
  </nav>

  <!-- PAGE -->
  <div class="pt-14 min-h-screen">
    <div id="profileContent" class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8"></div>
  </div>

  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Unauthenticated');

    const viewId      = parseInt(new URLSearchParams(location.search).get('id'));
    const currentUser = getUser();
    const isOwn       = !viewId || (currentUser && viewId === currentUser.id);
    const user        = isOwn
      ? (currentUser || { name: 'Usuario', avatar: 'U', city: 'España', type: 'Ambos', isFounder: false, isAdmin: false })
      : (MOCK_USERS.find(u => u.id === viewId) || null);

    const allProducts  = [...PRODUCTS, ...JSON.parse(localStorage.getItem('rs_products') || '[]')];
    const userProducts = allProducts.filter(p =>
      isOwn ? (p.seller?.id === (currentUser?.id || 0) || currentUser?.id === 0) : p.seller?.id === viewId
    );

    const container = document.getElementById('profileContent');

    if (!user) {
      container.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:96px 0;text-align:center">
          <div style="font-weight:600;font-size:14px;color:#0f172a;margin-bottom:16px">Usuario no encontrado</div>
          <a href="marketplace.html" style="padding:8px 20px;border-radius:6px;background:#0f172a;color:white;font-size:13px;font-weight:500;text-decoration:none">Volver al marketplace</a>
        </div>`;
    } else {
      const totalViews = userProducts.reduce((s, p) => s + (p.views || 0), 0);
      const avgRating  = userProducts.length
        ? (userProducts.reduce((s, p) => s + (p.seller.rating || 0), 0) / userProducts.length).toFixed(1)
        : '—';

      // HEADER
      const header = document.createElement('div');
      header.className = 'bg-white rounded-lg border border-slate-200 p-6 mb-5';
      header.innerHTML = `
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-5">
          <div class="w-14 h-14 rounded-full bg-slate-900 text-white font-bold text-xl flex items-center justify-center flex-shrink-0">
            ${user.avatar || user.name[0]}
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex flex-wrap items-center gap-2 mb-1">
              <h1 class="font-bold text-lg text-slate-900">${user.name}</h1>
              ${user.isFounder ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md bg-amber-50 text-amber-700 text-xs font-semibold border border-amber-200">
                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                Fundador
              </span>` : ''}
              ${user.isAdmin ? `<span class="px-2 py-0.5 rounded-md bg-slate-100 text-slate-600 text-xs font-semibold">Admin</span>` : ''}
            </div>
            <div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-sm text-slate-500 mb-4">
              ${user.city ? `<span>${user.city}</span><span class="text-slate-300">·</span>` : ''}
              ${user.type ? `<span>${user.type}</span><span class="text-slate-300">·</span>` : ''}
              <span>Miembro desde 2025</span>
            </div>
            <div class="flex gap-8">
              <div><div class="font-bold text-base text-slate-900">${userProducts.length}</div><div class="text-xs text-slate-400 mt-0.5">Lotes activos</div></div>
              <div><div class="font-bold text-base text-slate-900">${avgRating}</div><div class="text-xs text-slate-400 mt-0.5">Valoración</div></div>
              <div><div class="font-bold text-base text-slate-900">${totalViews}</div><div class="text-xs text-slate-400 mt-0.5">Visitas totales</div></div>
            </div>
          </div>
          <div class="flex-shrink-0">
            ${isOwn
              ? `<button onclick="showToast('Edición de perfil disponible próximamente','success')" class="px-4 py-2 rounded-md border border-slate-200 text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors duration-150 cursor-pointer">Editar perfil</button>`
              : `<a href="mensajes.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-md bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 transition-colors duration-150 cursor-pointer">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.625 9.75a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375m-13.5 3.01c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.184-4.183a1.14 1.14 0 01.778-.332 48.294 48.294 0 005.83-.498c1.585-.233 2.708-1.626 2.708-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z"/></svg>
                  Enviar mensaje
                </a>`}
          </div>
        </div>`;
      container.appendChild(header);

      // FOUNDER BANNER
      if (isOwn && user.isFounder) {
        const banner = document.createElement('div');
        banner.className = 'flex items-center gap-3 bg-amber-50 border border-amber-200 rounded-lg px-4 py-3 mb-5';
        banner.innerHTML = `
          <svg class="w-4 h-4 text-amber-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
          <p class="text-sm text-amber-800"><strong>Fundador ReStock</strong> — Comisión 0% durante los primeros 2 meses en todas tus transacciones.</p>`;
        container.appendChild(banner);
      }

      // STATS (own only)
      if (isOwn) {
        const stats = document.createElement('div');
        stats.className = 'bg-white rounded-lg border border-slate-200 p-5 mb-5';
        stats.innerHTML = `
          <h2 class="font-semibold text-slate-900 text-sm mb-4">Resumen de actividad</h2>
          <div class="grid grid-cols-3 gap-3">
            <div class="text-center p-4 bg-slate-50 rounded-md">
              <div class="font-bold text-2xl text-slate-900">${userProducts.length}</div>
              <div class="text-xs text-slate-400 mt-1">Lotes publicados</div>
            </div>
            <div class="text-center p-4 bg-slate-50 rounded-md">
              <div class="font-bold text-2xl text-slate-900">0€</div>
              <div class="text-xs text-slate-400 mt-1">Ventas totales</div>
            </div>
            <div class="text-center p-4 bg-slate-50 rounded-md">
              <div class="font-bold text-base text-slate-900">${user.isFounder ? 'Fundador' : 'Estándar'}</div>
              <div class="text-xs text-slate-400 mt-1">Plan actual</div>
            </div>
          </div>`;
        container.appendChild(stats);
      }

      // LISTINGS
      const listings = document.createElement('div');
      listings.className = 'bg-white rounded-lg border border-slate-200 p-5 mb-5';
      if (userProducts.length) {
        listings.innerHTML = `
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-semibold text-slate-900 text-sm">Lotes activos (${userProducts.length})</h2>
            ${isOwn ? `<a href="publicar.html" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-slate-900 text-white text-xs font-medium hover:bg-slate-700 transition-colors duration-150 cursor-pointer">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              Publicar nuevo
            </a>` : ''}
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">
            ${userProducts.slice(0, 6).map(p => `
              <div class="p-card" onclick="window.location='producto.html?id=${p.id}'" role="link" tabindex="0">
                <div style="position:relative">
                  <img class="p-card-img" src="${p.images[0]}" alt="${p.title}" loading="lazy" />
                  <span class="p-cond-badge cond-${p.condition}">${CONDITIONS[p.condition].label}</span>
                </div>
                <div class="p-card-body">
                  <div class="p-card-title">${p.title}</div>
                  <div class="p-card-price">${formatPrice(p.price)}</div>
                  <div class="p-card-meta"><span>${p.quantity} ${p.unit}</span><span>${p.views} vistas</span></div>
                </div>
              </div>`).join('')}
          </div>`;
      } else {
        listings.innerHTML = `
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-semibold text-slate-900 text-sm">Lotes activos (0)</h2>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 0;text-align:center">
            <div style="font-size:13px;color:#64748b;margin-bottom:12px">Sin lotes publicados aún</div>
            ${isOwn ? `<a href="publicar.html" style="padding:8px 16px;border-radius:6px;background:#0f172a;color:white;font-size:13px;font-weight:500;text-decoration:none">Publicar primer lote</a>` : ''}
          </div>`;
      }
      container.appendChild(listings);

      // REVIEWS
      const reviews = document.createElement('div');
      reviews.className = 'bg-white rounded-lg border border-slate-200 p-5';
      const reviewCount = userProducts.length ? (userProducts[0].seller.reviews || 0) : 0;
      const sampleReviews = ['Trato excelente y producto tal como se describe. Muy recomendable.', 'Envío rápido y lote en perfectas condiciones. Repetiremos.', 'El lote llegó completo y sin problemas. Buena comunicación.'];
      reviews.innerHTML = `
        <h2 class="font-semibold text-slate-900 text-sm mb-4">Valoraciones (${reviewCount})</h2>
        ${reviewCount > 0
          ? `<div class="space-y-3">
              ${sampleReviews.slice(0, reviewCount).map(text => `
                <div class="bg-slate-50 rounded-md p-4 border border-slate-100">
                  <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-medium text-slate-900">Comprador verificado</span>
                    <div class="flex gap-0.5">${Array.from({length:5}, () => `<svg class="w-3 h-3 text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`).join('')}</div>
                  </div>
                  <p class="text-sm text-slate-500">${text}</p>
                </div>`).join('')}
            </div>`
          : `<div style="text-align:center;padding:32px 0;font-size:13px;color:#94a3b8">Sin valoraciones aún.</div>`}`;
      container.appendChild(reviews);
    }
  </script>
</body>
</html>
