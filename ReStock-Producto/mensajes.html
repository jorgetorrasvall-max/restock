<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensajes — ReStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Newsreader', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            paper: '#FDFBF7',
            navy: '#1A3C6E',
            'navy-dark': '#142d54',
            gold: '#E8A020',
            'gold-light': '#FEF3DC',
            ink: '#1A1A1A',
            muted: '#5C5C5C',
            warm: '#E8E4DC',
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .font-serif, h1, h2, h3 { font-family: 'Newsreader', Georgia, serif; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
    .conv-item { cursor: pointer; transition: background 150ms; }
    .conv-item:hover { background: rgba(232,228,220,.4); }
    .conv-item.active { background: rgba(26,60,110,.05); border-right: 2px solid #1A3C6E; }
    .msg-me { background: #1A3C6E; color: #fff; border-radius: 1rem 1rem 0.25rem 1rem; align-self: flex-end; }
    .msg-them { background: #fff; color: #1A1A1A; border: 1px solid #E8E4DC; border-radius: 1rem 1rem 1rem 0.25rem; align-self: flex-start; }
    #chatMessages { display: flex; flex-direction: column; gap: 8px; }
    /* Mobile: hide sidebar when chat open */
    @media (max-width: 767px) {
      .mobile-chat-open #convList { display: none; }
      .mobile-chat-open #chatPane { display: flex; }
      #chatPane { display: none; }
    }
  </style>
</head>
<body class="bg-paper text-ink antialiased">

  <!-- NAV -->
  <header class="sticky top-0 z-50 bg-paper/95 backdrop-blur-sm border-b border-warm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center gap-6">
      <a href="index.html" class="font-serif italic text-xl font-semibold text-navy flex-shrink-0 hover:opacity-80 transition-opacity duration-150">ReStock</a>
      <nav class="hidden md:flex items-center gap-1 flex-1">
        <a href="marketplace.html" class="px-3 py-1.5 text-sm text-muted hover:text-ink transition-colors duration-150 cursor-pointer">Explorar lotes</a>
      </nav>
      <div class="hidden md:flex items-center gap-4 ml-auto" id="navAuth"></div>
    </div>
  </header>

  <!-- MESSAGES LAYOUT -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div id="messagesRoot" class="bg-white border border-warm rounded-xl overflow-hidden flex" style="height: calc(100vh - 130px); min-height: 500px;">

      <!-- Conversation list -->
      <div id="convList" class="w-full md:w-72 lg:w-80 flex-shrink-0 border-r border-warm flex flex-col">
        <div class="px-4 py-3 border-b border-warm">
          <h1 class="font-serif text-lg font-semibold text-ink">Mensajes</h1>
          <p id="unreadCount" class="text-xs text-muted mt-0.5"></p>
        </div>
        <div class="overflow-y-auto flex-1" id="convListInner"></div>
      </div>

      <!-- Chat pane -->
      <div id="chatPane" class="flex-1 flex flex-col min-w-0">
        <!-- Empty state -->
        <div id="chatEmpty" class="flex-1 flex flex-col items-center justify-center text-center px-6">
          <div class="font-serif text-5xl font-semibold text-warm mb-3">—</div>
          <p class="text-base font-medium text-ink mb-1">Selecciona una conversación</p>
          <p class="text-sm text-muted">Tus mensajes con compradores y vendedores aparecerán aquí.</p>
        </div>

        <!-- Active chat -->
        <div id="chatActive" class="hidden flex-1 flex flex-col min-h-0">
          <!-- Chat header -->
          <div class="px-4 py-3 border-b border-warm flex items-center gap-3 flex-shrink-0">
            <button id="backBtn" class="md:hidden p-1.5 text-muted hover:text-ink cursor-pointer mr-1" aria-label="Volver">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div id="chatAvatar" class="w-8 h-8 rounded-full bg-navy text-white text-sm font-semibold flex items-center justify-center flex-shrink-0"></div>
            <div class="flex-1 min-w-0">
              <p id="chatName" class="text-sm font-semibold text-ink truncate"></p>
              <a id="chatProductLink" href="#" class="text-xs text-muted hover:text-navy transition-colors duration-150 truncate block"></a>
            </div>
          </div>

          <!-- Messages -->
          <div class="flex-1 overflow-y-auto px-4 py-4" id="chatScrollArea">
            <div id="chatMessages"></div>
          </div>

          <!-- Input -->
          <div class="border-t border-warm px-4 py-3 flex-shrink-0">
            <div class="flex items-end gap-2">
              <textarea id="msgInput" rows="1" placeholder="Escribe un mensaje…"
                class="flex-1 px-3 py-2.5 rounded-lg border border-warm text-sm bg-paper focus:outline-none focus:ring-2 focus:ring-navy/15 focus:border-navy/40 transition-colors duration-150 resize-none"
                style="max-height: 120px;"></textarea>
              <button id="sendBtn" class="p-2.5 rounded-lg bg-navy text-white hover:bg-navy-dark transition-colors duration-150 cursor-pointer flex-shrink-0" aria-label="Enviar">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.269 20.876L5.999 12zm0 0h7.5"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-init.js"></script>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script>
    requireAuth();
    const user = getUser();

    // ── Nav ────────────────────────────────────────────────────────────────────
    document.getElementById('navAuth').innerHTML = `
      <a href="perfil.html" class="flex items-center gap-2 cursor-pointer group">
        <div class="w-7 h-7 rounded-full bg-navy text-white text-xs font-semibold flex items-center justify-center">${user.avatar}</div>
        <span class="text-sm text-muted group-hover:text-ink transition-colors duration-150 hidden lg:block">${user.name.split('—')[0].trim()}</span>
      </a>
      <a href="publicar.html" class="px-4 py-2 rounded-md bg-navy text-white text-sm font-medium hover:bg-navy-dark transition-colors duration-150 cursor-pointer">Publicar lote</a>
    `;

    // ── Conversations ──────────────────────────────────────────────────────────
    let activeConvId = null;
    const conversations = MOCK_CONVERSATIONS;

    const totalUnread = conversations.reduce((s, c) => s + c.unread, 0);
    document.getElementById('unreadCount').textContent = totalUnread
      ? `${totalUnread} sin leer`
      : 'Sin mensajes nuevos';

    function renderConvList() {
      const inner = document.getElementById('convListInner');
      inner.innerHTML = conversations.map(c => {
        const prod = PRODUCTS.find(p => p.id === c.productId);
        return `
          <div class="conv-item px-4 py-3 border-b border-warm/60 ${c.id === activeConvId ? 'active' : ''}" data-conv="${c.id}">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-navy text-white text-xs font-semibold flex items-center justify-center flex-shrink-0">${c.with.avatar}</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between gap-2">
                  <p class="text-sm font-semibold text-ink truncate">${c.with.name}</p>
                  <span class="text-xs text-muted flex-shrink-0">${c.time}</span>
                </div>
                <p class="text-xs text-muted truncate mt-0.5">${prod ? prod.title : ''}</p>
                <p class="text-xs text-muted truncate">${c.lastMessage}</p>
              </div>
              ${c.unread ? `<span class="w-5 h-5 rounded-full bg-navy text-white text-[10px] font-semibold flex items-center justify-center flex-shrink-0">${c.unread}</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function openConversation(convId) {
      const conv = conversations.find(c => c.id === convId);
      if (!conv) return;
      activeConvId = convId;
      conv.unread = 0;

      // Update unread count
      const totalUnread = conversations.reduce((s, c) => s + c.unread, 0);
      document.getElementById('unreadCount').textContent = totalUnread
        ? `${totalUnread} sin leer`
        : 'Sin mensajes nuevos';

      // Update list active state
      document.querySelectorAll('.conv-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.conv) === convId);
      });

      // Fill chat header
      document.getElementById('chatAvatar').textContent = conv.with.avatar;
      document.getElementById('chatName').textContent = conv.with.name;
      const prod = PRODUCTS.find(p => p.id === conv.productId);
      const link = document.getElementById('chatProductLink');
      if (prod) { link.textContent = prod.title; link.href = `producto.html?id=${prod.id}`; }
      else { link.textContent = ''; }

      // Render messages
      renderMessages(conv);

      // Show chat
      document.getElementById('chatEmpty').classList.add('hidden');
      document.getElementById('chatActive').classList.remove('hidden');
      document.getElementById('messagesRoot').classList.add('mobile-chat-open');

      // Scroll to bottom
      const scroll = document.getElementById('chatScrollArea');
      setTimeout(() => scroll.scrollTop = scroll.scrollHeight, 50);
    }

    function renderMessages(conv) {
      document.getElementById('chatMessages').innerHTML = conv.messages.map(m => `
        <div class="flex ${m.from === 'me' ? 'justify-end' : 'justify-start'}">
          <div class="max-w-[70%]">
            <div class="${m.from === 'me' ? 'msg-me' : 'msg-them'} px-3.5 py-2.5 text-sm leading-relaxed">${m.text}</div>
            <p class="text-[10px] text-muted mt-1 ${m.from === 'me' ? 'text-right' : 'text-left'}">${m.time}</p>
          </div>
        </div>
      `).join('');
    }

    function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !activeConvId) return;
      const conv = conversations.find(c => c.id === activeConvId);
      const now = new Date();
      const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
      conv.messages.push({ from: 'me', text, time: timeStr });
      conv.lastMessage = text;
      conv.time = 'ahora';
      input.value = '';
      input.style.height = 'auto';
      renderMessages(conv);
      renderConvList();
      const scroll = document.getElementById('chatScrollArea');
      scroll.scrollTop = scroll.scrollHeight;
    }

    // ── Events ─────────────────────────────────────────────────────────────────
    document.getElementById('convListInner').addEventListener('click', e => {
      const item = e.target.closest('.conv-item');
      if (item) openConversation(parseInt(item.dataset.conv));
    });

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('msgInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    document.getElementById('backBtn').addEventListener('click', () => {
      document.getElementById('messagesRoot').classList.remove('mobile-chat-open');
      activeConvId = null;
    });

    // ── Boot ───────────────────────────────────────────────────────────────────
    renderConvList();

    // Auto-open from product page
    const productParam = getParam('product');
    if (productParam) {
      const conv = conversations.find(c => c.productId === parseInt(productParam));
      if (conv) openConversation(conv.id);
    }
  </script>
</body>
</html>
