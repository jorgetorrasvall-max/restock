<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensajes — ReStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-heading, h1, h2, h3 { font-family: 'Lexend', sans-serif; }
    #dropdownMenu { display: none; } #dropdownMenu.open { display: block; }
    #mobileNavMenu { display: none; } #mobileNavMenu.open { display: block; }

    /* Chat layout: full height minus nav */
    .chat-layout { height: calc(100vh - 64px); display: flex; overflow: hidden; }
    .conv-sidebar { width: 300px; flex-shrink: 0; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; background: white; overflow: hidden; }
    .conv-items { flex: 1; overflow-y: auto; }
    .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #F8FAFC; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .chat-input-wrap { background: white; border-top: 1px solid #e5e7eb; padding: 16px; }

    /* Conversation items */
    .conv-item { padding: 14px 16px; cursor: pointer; border-bottom: 1px solid #f3f4f6; transition: background 0.15s; }
    .conv-item:hover { background: #F8FAFC; }
    .conv-item.active { background: #EEF3FA; border-left: 3px solid #1A3C6E; }

    /* Message bubbles */
    .msg-me   { display: flex; flex-direction: column; align-items: flex-end; }
    .msg-them { display: flex; flex-direction: column; align-items: flex-start; }
    .bubble-me   { background: #1A3C6E; color: white; padding: 10px 14px; border-radius: 16px 16px 4px 16px; max-width: 70%; font-size: 14px; line-height: 1.5; }
    .bubble-them { background: white; color: #111827; border: 1px solid #e5e7eb; padding: 10px 14px; border-radius: 16px 16px 16px 4px; max-width: 70%; font-size: 14px; line-height: 1.5; }
    .msg-time { font-size: 11px; color: #9ca3af; margin-top: 3px; }

    /* Scrollbar */
    .chat-messages::-webkit-scrollbar, .conv-items::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track, .conv-items::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb, .conv-items::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }

    /* Mobile: hide sidebar when conv open */
    @media (max-width: 768px) {
      .conv-sidebar { width: 100%; position: absolute; z-index: 10; height: calc(100vh - 64px); }
      .conv-sidebar.hidden-mobile { display: none; }
      .chat-main { width: 100%; }
    }

    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.15); opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast--success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .toast--error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
  </style>
</head>
<body class="bg-[#F8FAFC] text-gray-900 antialiased overflow-hidden">

  <!-- NAV -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 h-16">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 h-full flex items-center gap-4">
      <a href="marketplace.html" class="font-heading font-bold text-xl text-[#1A3C6E] flex-shrink-0">Re<span class="text-[#E8A020]">Stock</span></a>
      <div class="flex-1 max-w-xl hidden sm:block">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
          <input id="navSearch" type="text" placeholder="Buscar lotes…" class="w-full pl-9 pr-4 py-2 rounded-lg border border-gray-200 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#1A3C6E]/20 focus:border-[#1A3C6E] transition-all duration-200" />
        </div>
      </div>
      <div class="hidden md:flex items-center gap-2 ml-auto flex-shrink-0">
        <a href="marketplace.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors duration-200 cursor-pointer">Explorar</a>
        <a href="publicar.html" class="inline-flex items-center gap-1 px-4 py-2 rounded-lg bg-[#1A3C6E] text-white text-sm font-semibold hover:bg-[#163260] transition-colors duration-200 cursor-pointer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Publicar lote
        </a>
        <a href="mensajes.html" class="relative p-2 rounded-lg bg-[#1A3C6E]/8 text-[#1A3C6E] cursor-pointer">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/></svg>
          <span id="msgBadge" class="absolute -top-0.5 -right-0.5 w-4 h-4 rounded-full bg-red-500 text-white text-[10px] font-bold items-center justify-center" style="display:none"></span>
        </a>
        <div class="relative">
          <button id="userBtn" class="flex items-center gap-2 pl-2 pr-3 py-1.5 rounded-lg hover:bg-gray-100 transition-colors duration-200 cursor-pointer">
            <span id="userAvatar" class="w-7 h-7 rounded-full bg-[#1A3C6E] text-white text-xs font-bold flex items-center justify-center flex-shrink-0">?</span>
            <span id="userName" class="text-sm font-medium text-gray-700">Entrar</span>
            <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div id="dropdownMenu" class="absolute right-0 top-full mt-1 w-52 bg-white rounded-xl border border-gray-200 shadow-xl py-1 z-50">
            <a href="perfil.html"   class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 cursor-pointer">Mi perfil</a>
            <a href="publicar.html" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 cursor-pointer">Publicar lote</a>
            <a href="admin.html" id="adminLink" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 cursor-pointer" style="display:none">Panel admin</a>
            <div class="border-t border-gray-100 my-1"></div>
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 cursor-pointer">Cerrar sesión</button>
          </div>
        </div>
      </div>
      <button id="mobileNavToggle" class="md:hidden ml-auto p-2 rounded-lg text-gray-500 hover:bg-gray-100 cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobileNavMenu" class="border-t border-gray-200 bg-white">
      <div class="px-4 py-3 space-y-1 max-w-screen-xl mx-auto">
        <a href="marketplace.html" class="block px-3 py-2 rounded-md text-sm text-gray-700 hover:bg-gray-50">Explorar</a>
        <a href="publicar.html"    class="block px-3 py-2 rounded-md text-sm text-gray-700 hover:bg-gray-50">Publicar lote</a>
        <a href="perfil.html"      class="block px-3 py-2 rounded-md text-sm text-gray-700 hover:bg-gray-50">Mi perfil</a>
        <button onclick="logout()" class="block w-full text-left px-3 py-2 rounded-md text-sm text-red-600 hover:bg-red-50 cursor-pointer">Cerrar sesión</button>
      </div>
    </div>
  </nav>

  <!-- CHAT LAYOUT -->
  <div class="pt-16 relative">
    <div class="chat-layout">

      <!-- SIDEBAR: conversation list -->
      <div class="conv-sidebar" id="convSidebar">
        <div class="px-4 py-4 border-b border-gray-100 flex items-center justify-between flex-shrink-0">
          <h2 class="font-heading font-semibold text-gray-900">Mensajes</h2>
        </div>
        <div class="conv-items" id="convItems"></div>
      </div>

      <!-- CHAT AREA -->
      <div class="chat-main" id="chatMain">

        <!-- Empty state -->
        <div id="chatEmpty" class="flex-1 flex flex-col items-center justify-center text-center p-8">
          <div class="w-16 h-16 rounded-2xl bg-white border border-gray-200 flex items-center justify-center mx-auto mb-4 shadow-sm">
            <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.625 9.75a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375m-13.5 3.01c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.184-4.183a1.14 1.14 0 01.778-.332 48.294 48.294 0 005.83-.498c1.585-.233 2.708-1.626 2.708-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z"/></svg>
          </div>
          <p class="font-heading font-semibold text-gray-900 mb-1">Selecciona una conversación</p>
          <p class="text-sm text-gray-500">o <a href="marketplace.html" class="text-[#1A3C6E] font-semibold hover:underline">explora el marketplace</a> para contactar vendedores</p>
        </div>

        <!-- Active chat -->
        <div id="chatActive" class="hidden flex-col h-full">
          <!-- Chat header -->
          <div id="chatHeader" class="flex items-center gap-3 px-5 py-3.5 bg-white border-b border-gray-200 flex-shrink-0"></div>
          <!-- Messages -->
          <div class="chat-messages" id="chatMessages"></div>
          <!-- Input -->
          <div class="chat-input-wrap flex items-end gap-3">
            <textarea id="msgInput" rows="1" placeholder="Escribe un mensaje…"
              class="flex-1 resize-none px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1A3C6E]/20 focus:border-[#1A3C6E] transition-all duration-200 max-h-28 overflow-y-auto"></textarea>
            <button id="sendBtn" class="flex-shrink-0 w-10 h-10 rounded-xl bg-[#1A3C6E] text-white flex items-center justify-center hover:bg-[#163260] transition-colors duration-200 cursor-pointer">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Unauthenticated');

    let conversations = JSON.parse(localStorage.getItem('rs_conversations') || 'null') || [...MOCK_CONVERSATIONS];
    let activeConvId  = null;

    // Handle ?new= param (coming from product page)
    const newProductId = parseInt(new URLSearchParams(location.search).get('new'));
    if (newProductId) {
      const allP = [...PRODUCTS, ...JSON.parse(localStorage.getItem('rs_products') || '[]')];
      const prod = allP.find(p => p.id === newProductId);
      if (prod) {
        const exists = conversations.find(c => c.productId === newProductId);
        if (!exists) {
          const nc = { id: Date.now(), productId: prod.id, with: { id: prod.seller.id, name: prod.seller.name, avatar: prod.seller.avatar }, lastMessage: '', time: 'ahora', unread: 0, messages: [] };
          conversations.unshift(nc);
          activeConvId = nc.id;
        } else {
          activeConvId = exists.id;
        }
      }
    }

    function save() { localStorage.setItem('rs_conversations', JSON.stringify(conversations)); }

    function renderList() {
      const allP = [...PRODUCTS, ...JSON.parse(localStorage.getItem('rs_products') || '[]')];
      const el   = document.getElementById('convItems');
      if (!conversations.length) {
        el.innerHTML = `<div class="p-6 text-center text-sm text-gray-400">Sin conversaciones aún.<br/><a href="marketplace.html" class="text-[#1A3C6E] font-semibold mt-2 inline-block hover:underline">Explorar marketplace</a></div>`;
        return;
      }
      el.innerHTML = conversations.map(c => {
        const prod = allP.find(p => p.id === c.productId);
        return `
          <div class="conv-item ${c.id === activeConvId ? 'active' : ''}" onclick="openConv(${c.id})">
            <div class="flex items-start gap-3">
              <div class="w-9 h-9 rounded-full bg-[#1A3C6E] text-white text-sm font-heading font-bold flex items-center justify-center flex-shrink-0">${c.with.avatar}</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between gap-2">
                  <span class="font-semibold text-sm text-gray-900 truncate">${c.with.name}</span>
                  <span class="text-[11px] text-gray-400 flex-shrink-0">${c.time}</span>
                </div>
                <div class="text-xs text-[#1A3C6E] font-medium truncate mt-0.5">${prod ? prod.title : 'Producto'}</div>
                <div class="flex items-center justify-between mt-0.5">
                  <span class="text-xs text-gray-500 truncate">${c.lastMessage || 'Sin mensajes aún'}</span>
                  ${c.unread > 0 ? `<span class="w-4 h-4 rounded-full bg-red-500 text-white text-[10px] font-bold flex items-center justify-center flex-shrink-0 ml-2">${c.unread}</span>` : ''}
                </div>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function openConv(id) {
      activeConvId = id;
      const conv = conversations.find(c => c.id === id);
      if (!conv) return;
      conv.unread = 0;
      save();
      renderList();

      const allP = [...PRODUCTS, ...JSON.parse(localStorage.getItem('rs_products') || '[]')];
      const prod = allP.find(p => p.id === conv.productId);

      document.getElementById('chatEmpty').classList.add('hidden');
      const active = document.getElementById('chatActive');
      active.classList.remove('hidden');
      active.classList.add('flex');

      document.getElementById('chatHeader').innerHTML = `
        <div class="w-9 h-9 rounded-full bg-[#1A3C6E] text-white text-sm font-heading font-bold flex items-center justify-center flex-shrink-0">${conv.with.avatar}</div>
        <div class="flex-1 min-w-0">
          <div class="font-heading font-semibold text-gray-900 text-sm">${conv.with.name}</div>
          ${prod ? `<div class="text-xs text-gray-500 truncate">Re: ${prod.title}</div>` : ''}
        </div>
        ${prod ? `<a href="producto.html?id=${prod.id}" class="flex-shrink-0 px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-medium text-gray-700 hover:bg-gray-50 transition-colors duration-200 cursor-pointer">Ver lote →</a>` : ''}`;

      renderMessages(conv);

      // Mobile: hide sidebar
      if (window.innerWidth < 768) {
        document.getElementById('convSidebar').classList.add('hidden-mobile');
      }
    }

    function renderMessages(conv) {
      const el = document.getElementById('chatMessages');
      if (!conv.messages.length) {
        el.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center text-sm text-gray-400 py-8">Inicia la conversación sobre este lote.</div>`;
        return;
      }
      el.innerHTML = conv.messages.map(m => `
        <div class="msg-${m.from === 'me' ? 'me' : 'them'}">
          <div class="bubble-${m.from === 'me' ? 'me' : 'them'}">${m.text}</div>
          <div class="msg-time">${m.time}</div>
        </div>`).join('');
      el.scrollTop = el.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('msgInput');
      const text  = input.value.trim();
      if (!text || !activeConvId) return;
      const conv = conversations.find(c => c.id === activeConvId);
      if (!conv) return;
      const now = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      conv.messages.push({ from: 'me', text, time: now });
      conv.lastMessage = text;
      conv.time = 'ahora';
      input.value = '';
      input.style.height = 'auto';
      save(); renderList(); renderMessages(conv);

      // Simulated reply
      setTimeout(() => {
        const replies = ['¡Hola! Gracias por tu interés en el lote.','¿Cuándo podríais hacer el envío?','El lote sigue disponible. ¿Necesitas factura proforma?','Podemos negociar si compras más de un lote.','Hacemos envío a toda España. Transporte a cargo del comprador.'];
        conv.messages.push({ from: 'them', text: replies[Math.floor(Math.random() * replies.length)], time: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }) });
        save(); renderList(); renderMessages(conv);
      }, 1200);
    }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('msgInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 112) + 'px';
    });

    renderList();
    if (activeConvId) openConv(activeConvId);
    else if (conversations.length) openConv(conversations[0].id);
  </script>
</body>
</html>
