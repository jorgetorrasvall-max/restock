<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensajes — ReStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    #dropdownMenu { display:none; } #dropdownMenu.open { display:block; }
    #mobileNavMenu { display:none; } #mobileNavMenu.open { display:block; }

    .chat-layout { height: calc(100vh - 56px); display:flex; overflow:hidden; }
    .conv-sidebar { width:280px; flex-shrink:0; border-right:1px solid #e2e8f0; display:flex; flex-direction:column; background:white; overflow:hidden; }
    .conv-items { flex:1; overflow-y:auto; }
    .chat-main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#f8fafc; }
    .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px; }
    .chat-input-wrap { background:white; border-top:1px solid #e2e8f0; padding:14px 16px; }

    .conv-item { padding:12px 16px; cursor:pointer; border-bottom:1px solid #f1f5f9; transition:background 0.1s; }
    .conv-item:hover { background:#f8fafc; }
    .conv-item.active { background:#f0f9ff; border-left:2px solid #2563eb; padding-left:14px; }

    .msg-me   { display:flex; flex-direction:column; align-items:flex-end; }
    .msg-them { display:flex; flex-direction:column; align-items:flex-start; }
    .bubble-me   { background:#0f172a; color:white; padding:9px 13px; border-radius:12px 12px 3px 12px; max-width:68%; font-size:13px; line-height:1.5; }
    .bubble-them { background:white; color:#0f172a; border:1px solid #e2e8f0; padding:9px 13px; border-radius:12px 12px 12px 3px; max-width:68%; font-size:13px; line-height:1.5; }
    .msg-time { font-size:10px; color:#94a3b8; margin-top:2px; }

    .chat-messages::-webkit-scrollbar, .conv-items::-webkit-scrollbar { width:3px; }
    .chat-messages::-webkit-scrollbar-track, .conv-items::-webkit-scrollbar-track { background:transparent; }
    .chat-messages::-webkit-scrollbar-thumb, .conv-items::-webkit-scrollbar-thumb { background:#e2e8f0; border-radius:3px; }

    @media (max-width: 768px) {
      .conv-sidebar { width:100%; position:absolute; z-index:10; height:calc(100vh - 56px); }
      .conv-sidebar.hidden-mobile { display:none; }
      .chat-main { width:100%; }
    }

    .toast { position:fixed; bottom:20px; right:20px; z-index:9999; padding:10px 16px; border-radius:8px; font-size:13px; font-weight:500; box-shadow:0 2px 12px rgba(0,0,0,0.12); opacity:0; transform:translateY(6px); transition:opacity 0.2s,transform 0.2s; pointer-events:none; }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast--success { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
    .toast--error   { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased overflow-hidden">

  <!-- NAV -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-slate-200 h-14">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 h-full flex items-center gap-4">
      <a href="marketplace.html" class="font-bold text-sm text-slate-900 flex-shrink-0">ReStock</a>
      <div class="flex-1 max-w-md hidden sm:block">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
          <input id="navSearch" type="text" placeholder="Buscar lotes…" class="w-full pl-9 pr-4 py-1.5 rounded-md border border-slate-200 text-sm bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-colors duration-150" />
        </div>
      </div>
      <div class="hidden md:flex items-center gap-2 ml-auto flex-shrink-0">
        <a href="marketplace.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-100 cursor-pointer">Explorar</a>
        <a href="publicar.html" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-slate-900 text-white text-sm font-medium hover:bg-slate-700 transition-colors duration-150 cursor-pointer">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Publicar
        </a>
        <a href="mensajes.html" class="relative p-2 rounded-md bg-blue-50 text-blue-600 cursor-pointer">
          <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/></svg>
          <span id="msgBadge" class="absolute -top-0.5 -right-0.5 w-3.5 h-3.5 rounded-full bg-red-500 text-white text-[9px] font-bold items-center justify-center" style="display:none"></span>
        </a>
        <div class="relative">
          <button id="userBtn" class="flex items-center gap-2 pl-2 pr-3 py-1.5 rounded-md hover:bg-slate-100 cursor-pointer">
            <span id="userAvatar" class="w-6 h-6 rounded-full bg-slate-900 text-white text-xs font-semibold flex items-center justify-center flex-shrink-0">?</span>
            <span id="userName" class="text-sm text-slate-700">Entrar</span>
            <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div id="dropdownMenu" class="absolute right-0 top-full mt-1 w-48 bg-white rounded-lg border border-slate-200 shadow-lg py-1 z-50">
            <a href="perfil.html"    class="flex items-center gap-2.5 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer">Mi perfil</a>
            <a href="publicar.html"  class="flex items-center gap-2.5 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer">Publicar lote</a>
            <a href="admin.html" id="adminLink" class="flex items-center gap-2.5 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer" style="display:none">Panel admin</a>
            <div class="border-t border-slate-100 my-1"></div>
            <button onclick="logout()" class="w-full flex items-center gap-2.5 px-4 py-2 text-sm text-red-600 hover:bg-red-50 cursor-pointer">Cerrar sesión</button>
          </div>
        </div>
      </div>
      <button id="mobileNavToggle" class="md:hidden ml-auto p-2 rounded-md text-slate-500 hover:bg-slate-100 cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobileNavMenu" class="border-t border-slate-200 bg-white">
      <div class="px-4 py-3 space-y-1 max-w-screen-xl mx-auto">
        <a href="marketplace.html" class="block px-3 py-2 rounded-md text-sm text-slate-700 hover:bg-slate-50">Explorar</a>
        <a href="publicar.html"    class="block px-3 py-2 rounded-md text-sm text-slate-700 hover:bg-slate-50">Publicar lote</a>
        <a href="perfil.html"      class="block px-3 py-2 rounded-md text-sm text-slate-700 hover:bg-slate-50">Mi perfil</a>
        <button onclick="logout()" class="block w-full text-left px-3 py-2 rounded-md text-sm text-red-600 hover:bg-red-50 cursor-pointer">Cerrar sesión</button>
      </div>
    </div>
  </nav>

  <!-- CHAT LAYOUT -->
  <div class="pt-14 relative">
    <div class="chat-layout">

      <!-- SIDEBAR -->
      <div class="conv-sidebar" id="convSidebar">
        <div class="px-4 py-3.5 border-b border-slate-100 flex-shrink-0">
          <h2 class="font-semibold text-slate-900 text-sm">Mensajes</h2>
        </div>
        <div class="conv-items" id="convItems"></div>
      </div>

      <!-- CHAT AREA -->
      <div class="chat-main" id="chatMain">

        <div id="chatEmpty" class="flex-1 flex flex-col items-center justify-center text-center p-8">
          <div class="w-12 h-12 rounded-lg bg-white border border-slate-200 flex items-center justify-center mx-auto mb-4">
            <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.625 9.75a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375m-13.5 3.01c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.184-4.183a1.14 1.14 0 01.778-.332 48.294 48.294 0 005.83-.498c1.585-.233 2.708-1.626 2.708-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z"/></svg>
          </div>
          <p class="font-semibold text-slate-900 text-sm mb-1">Selecciona una conversación</p>
          <p class="text-sm text-slate-400">o <a href="marketplace.html" class="text-blue-600 hover:underline">explora el marketplace</a> para contactar vendedores</p>
        </div>

        <div id="chatActive" class="hidden flex-col h-full">
          <div id="chatHeader" class="flex items-center gap-3 px-4 py-3 bg-white border-b border-slate-200 flex-shrink-0"></div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-wrap flex items-end gap-3">
            <textarea id="msgInput" rows="1" placeholder="Escribe un mensaje…"
              class="flex-1 resize-none px-3.5 py-2.5 rounded-md border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-colors duration-150 max-h-28 overflow-y-auto"></textarea>
            <button id="sendBtn" class="flex-shrink-0 w-9 h-9 rounded-md bg-slate-900 text-white flex items-center justify-center hover:bg-slate-700 transition-colors duration-150 cursor-pointer">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Unauthenticated');

    let conversations = JSON.parse(localStorage.getItem('rs_conversations') || 'null') || [...MOCK_CONVERSATIONS];
    let activeConvId  = null;

    const newProductId = parseInt(new URLSearchParams(location.search).get('new'));
    if (newProductId) {
      const allP = [...PRODUCTS, ...JSON.parse(localStorage.getItem('rs_products') || '[]')];
      const prod = allP.find(p => p.id === newProductId);
      if (prod) {
        const exists = conversations.find(c => c.productId === newProductId);
        if (!exists) {
          const nc = { id: Date.now(), productId: prod.id, with: { id: prod.seller.id, name: prod.seller.name, avatar: prod.seller.avatar }, lastMessage: '', time: 'ahora', unread: 0, messages: [] };
          conversations.unshift(nc);
          activeConvId = nc.id;
        } else {
          activeConvId = exists.id;
        }
      }
    }

    function save() { localStorage.setItem('rs_conversations', JSON.stringify(conversations)); }

    function renderList() {
      const allP = [...PRODUCTS, ...JSON.parse(localStorage.getItem('rs_products') || '[]')];
      const el   = document.getElementById('convItems');
      if (!conversations.length) {
        el.innerHTML = `<div style="padding:24px;text-align:center;font-size:13px;color:#94a3b8">Sin conversaciones aún.<br/><a href="marketplace.html" style="color:#2563eb;text-decoration:none;font-weight:500;margin-top:8px;display:inline-block">Explorar marketplace</a></div>`;
        return;
      }
      el.innerHTML = conversations.map(c => {
        const prod = allP.find(p => p.id === c.productId);
        return `
          <div class="conv-item ${c.id === activeConvId ? 'active' : ''}" onclick="openConv(${c.id})">
            <div style="display:flex;align-items:flex-start;gap:10px">
              <div style="width:34px;height:34px;border-radius:50%;background:#0f172a;color:white;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0">${c.with.avatar}</div>
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
                  <span style="font-weight:600;font-size:13px;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.with.name}</span>
                  <span style="font-size:10px;color:#94a3b8;flex-shrink:0">${c.time}</span>
                </div>
                <div style="font-size:11px;color:#2563eb;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">${prod ? prod.title : 'Producto'}</div>
                <div style="display:flex;align-items:center;justify-content:space-between;margin-top:2px">
                  <span style="font-size:11px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.lastMessage || 'Sin mensajes aún'}</span>
                  ${c.unread > 0 ? `<span style="width:16px;height:16px;border-radius:50%;background:#ef4444;color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:6px">${c.unread}</span>` : ''}
                </div>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function openConv(id) {
      activeConvId = id;
      const conv = conversations.find(c => c.id === id);
      if (!conv) return;
      conv.unread = 0;
      save();
      renderList();

      const allP = [...PRODUCTS, ...JSON.parse(localStorage.getItem('rs_products') || '[]')];
      const prod = allP.find(p => p.id === conv.productId);

      document.getElementById('chatEmpty').classList.add('hidden');
      const active = document.getElementById('chatActive');
      active.classList.remove('hidden');
      active.classList.add('flex');

      document.getElementById('chatHeader').innerHTML = `
        <div style="width:32px;height:32px;border-radius:50%;background:#0f172a;color:white;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0">${conv.with.avatar}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13px;color:#0f172a">${conv.with.name}</div>
          ${prod ? `<div style="font-size:11px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Re: ${prod.title}</div>` : ''}
        </div>
        ${prod ? `<a href="producto.html?id=${prod.id}" style="flex-shrink:0;padding:6px 12px;border-radius:6px;border:1px solid #e2e8f0;font-size:12px;font-weight:500;color:#0f172a;text-decoration:none;white-space:nowrap" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'">Ver lote →</a>` : ''}`;

      renderMessages(conv);

      if (window.innerWidth < 768) {
        document.getElementById('convSidebar').classList.add('hidden-mobile');
      }
    }

    function renderMessages(conv) {
      const el = document.getElementById('chatMessages');
      if (!conv.messages.length) {
        el.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;font-size:13px;color:#94a3b8;padding:32px">Inicia la conversación sobre este lote.</div>`;
        return;
      }
      el.innerHTML = conv.messages.map(m => `
        <div class="msg-${m.from === 'me' ? 'me' : 'them'}">
          <div class="bubble-${m.from === 'me' ? 'me' : 'them'}">${m.text}</div>
          <div class="msg-time">${m.time}</div>
        </div>`).join('');
      el.scrollTop = el.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('msgInput');
      const text  = input.value.trim();
      if (!text || !activeConvId) return;
      const conv = conversations.find(c => c.id === activeConvId);
      if (!conv) return;
      const now = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      conv.messages.push({ from: 'me', text, time: now });
      conv.lastMessage = text;
      conv.time = 'ahora';
      input.value = '';
      input.style.height = 'auto';
      save(); renderList(); renderMessages(conv);

      setTimeout(() => {
        const replies = ['¡Hola! Gracias por tu interés en el lote.','¿Cuándo podríais hacer el envío?','El lote sigue disponible. ¿Necesitas factura proforma?','Podemos negociar si compras más de un lote.','Hacemos envío a toda España. Transporte a cargo del comprador.'];
        conv.messages.push({ from: 'them', text: replies[Math.floor(Math.random() * replies.length)], time: new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }) });
        save(); renderList(); renderMessages(conv);
      }, 1200);
    }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('msgInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 112) + 'px';
    });

    renderList();
    if (activeConvId) openConv(activeConvId);
    else if (conversations.length) openConv(conversations[0].id);
  </script>
</body>
</html>
