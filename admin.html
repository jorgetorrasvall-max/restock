<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — ReStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
<nav class="app-nav">
  <div class="app-nav-inner">
    <a href="marketplace.html" class="logo">Re<span>Stock</span></a>
    <div class="nav-search">
      <input type="text" id="navSearch" placeholder="Buscar lotes…" />
    </div>
    <div class="nav-links-app">
      <a href="marketplace.html">Explorar</a>
      <a href="publicar.html" class="btn-publish">+ Publicar lote</a>
    </div>
    <div class="user-dropdown">
      <button class="user-btn" id="userBtn">
        <span class="user-avatar" id="userAvatar">?</span>
        <span id="userName">Entrar</span> ▾
      </button>
      <div class="dropdown-menu" id="dropdownMenu">
        <a href="perfil.html">👤 Mi perfil</a>
        <a href="mensajes.html">💬 Mensajes</a>
        <a href="admin.html" id="adminLink" style="display:none">⚙️ Panel admin</a>
        <hr /><button class="danger" onclick="logout()">Cerrar sesión</button>
      </div>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <div class="admin-layout" id="adminContent">
    <div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-title">Verificando acceso…</div></div>
  </div>
</div>

<script src="data.js"></script>
<script src="shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const user = getUser();
  if (!user) { window.location.href = 'login.html'; return; }
  if (!user.isAdmin) {
    document.getElementById('adminContent').innerHTML = `
      <div class="empty-state"><div class="empty-icon">🔒</div>
      <div class="empty-title">Acceso restringido</div>
      <div class="empty-text">Solo jorgetorrasvall@gmail.com puede acceder al panel de administración.</div>
      <a href="marketplace.html" class="btn btn-navy" style="margin-top:16px">Volver al marketplace</a></div>`;
    return;
  }
  renderAdmin();
});

function renderAdmin() {
  const allProducts = [...PRODUCTS, ...JSON.parse(localStorage.getItem('rs_products') || '[]')];
  const totalGMV = allProducts.reduce((s, p) => s + p.price, 0);
  const totalViews = allProducts.reduce((s, p) => s + p.views, 0);

  document.getElementById('adminContent').innerHTML = `
    <!-- HEADER -->
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <h1 style="font-size:1.4rem;font-weight:800;color:var(--navy)">⚙️ Panel de administración</h1>
        <p style="font-size:13px;color:var(--gray-500);margin-top:2px">Restringido a jorgetorrasvall@gmail.com</p>
      </div>
      <div style="font-size:13px;color:var(--gray-400)">ReStock Beta · Abr 2026</div>
    </div>

    <!-- STATS -->
    <div class="admin-stats">
      <div class="admin-stat-card">
        <div class="admin-stat-label">Lotes publicados</div>
        <div class="admin-stat-num">${allProducts.length}</div>
        <div class="admin-stat-sub">+${JSON.parse(localStorage.getItem('rs_products')||'[]').length} nuevos tuyos</div>
      </div>
      <div class="admin-stat-card">
        <div class="admin-stat-label">Usuarios registrados</div>
        <div class="admin-stat-num">${MOCK_USERS.length}</div>
        <div class="admin-stat-sub">3 con acceso alpha</div>
      </div>
      <div class="admin-stat-card">
        <div class="admin-stat-label">GMV potencial</div>
        <div class="admin-stat-num">${Math.round(totalGMV/1000)}K€</div>
        <div class="admin-stat-sub">Valor de todos los lotes</div>
      </div>
      <div class="admin-stat-card">
        <div class="admin-stat-label">Visitas totales</div>
        <div class="admin-stat-num">${totalViews.toLocaleString('es-ES')}</div>
        <div class="admin-stat-sub">En todos los lotes</div>
      </div>
    </div>

    <!-- TABS -->
    <div>
      <div class="admin-tabs" style="margin-bottom:16px">
        <button class="admin-tab active" onclick="showTab('products',this)">📦 Lotes</button>
        <button class="admin-tab" onclick="showTab('users',this)">👥 Usuarios</button>
        <button class="admin-tab" onclick="showTab('codes',this)">🔑 Códigos alpha</button>
        <button class="admin-tab" onclick="showTab('stripe',this)">💳 Stripe</button>
        <button class="admin-tab" onclick="showTab('supabase',this)">🗄️ Supabase</button>
      </div>

      <!-- PRODUCTOS -->
      <div id="tab-products" class="admin-card">
        <div class="admin-card-header">
          <div class="admin-card-title">Todos los lotes (${allProducts.length})</div>
          <a href="publicar.html" class="btn btn-primary" style="font-size:13px">+ Nuevo lote</a>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr>
              <th>Título</th><th>Categoría</th><th>Estado</th><th>Precio</th><th>Cantidad</th><th>Vendedor</th><th>Ciudad</th><th>Vistas</th><th>Fecha</th><th>Acciones</th>
            </tr></thead>
            <tbody>
              ${allProducts.map(p => `
              <tr>
                <td><a href="producto.html?id=${p.id}" style="color:var(--navy);font-weight:600;font-size:13px">${p.title}</a></td>
                <td style="font-size:13px">${getCategoryIcon(p.category)} ${getCategoryName(p.category)}</td>
                <td><span class="badge badge-${p.condition}">${p.condition}</span></td>
                <td style="font-weight:700;color:var(--navy)">${formatPrice(p.price)}</td>
                <td style="font-size:13px">${p.quantity} ${p.unit}</td>
                <td style="font-size:13px">${p.seller.name}</td>
                <td style="font-size:13px">📍 ${p.seller.city}</td>
                <td style="font-size:13px">👁 ${p.views}</td>
                <td style="font-size:12px;color:var(--gray-400)">${p.created}</td>
                <td>
                  <div style="display:flex;gap:6px">
                    <a href="producto.html?id=${p.id}" class="btn btn-outline" style="padding:4px 10px;font-size:12px">Ver</a>
                    <button class="btn btn-outline" style="padding:4px 10px;font-size:12px;color:var(--red);border-color:var(--red)" onclick="deleteProduct(${p.id})">Eliminar</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- USUARIOS -->
      <div id="tab-users" class="admin-card" style="display:none">
        <div class="admin-card-header">
          <div class="admin-card-title">Usuarios registrados (${MOCK_USERS.length})</div>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr>
              <th>Nombre</th><th>Email</th><th>Ciudad</th><th>Tipo</th><th>Lotes</th><th>Estado</th><th>Acciones</th>
            </tr></thead>
            <tbody>
              ${MOCK_USERS.map(u => `
              <tr>
                <td><strong>${u.name}</strong></td>
                <td style="font-size:13px;color:var(--gray-500)">${u.email}</td>
                <td style="font-size:13px">📍 ${u.city}</td>
                <td style="font-size:13px">${u.type}</td>
                <td style="font-size:13px">${allProducts.filter(p=>p.seller.id===u.id).length}</td>
                <td>
                  ${u.isFounder ? '<span class="badge badge-founder">⭐ Fundador</span>' : ''}
                  ${u.isAdmin ? '<span class="badge badge-admin">Admin</span>' : '<span class="badge" style="background:var(--gray-100);color:var(--gray-500)">Normal</span>'}
                </td>
                <td><a href="perfil.html?id=${u.id}" class="btn btn-outline" style="padding:4px 10px;font-size:12px">Ver perfil</a></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- CÓDIGOS ALPHA -->
      <div id="tab-codes" class="admin-card" style="display:none">
        <div class="admin-card-header">
          <div class="admin-card-title">Códigos alpha (${ALPHA_CODES.filter(c=>!c.used).length} disponibles de ${ALPHA_CODES.length})</div>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr><th>Código</th><th>Estado</th><th>Usado por</th></tr></thead>
            <tbody>
              ${ALPHA_CODES.map(c => `
              <tr>
                <td><span class="code-pill">${c.code}</span></td>
                <td>
                  <span class="status-dot status-dot--${c.used ? 'gray' : 'green'}"></span>
                  ${c.used ? 'Usado' : 'Disponible'}
                </td>
                <td style="font-size:13px;color:var(--gray-400)">${c.usedBy || '—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- STRIPE -->
      <div id="tab-stripe" class="admin-card" style="display:none">
        <div class="admin-card-header">
          <div class="admin-card-title">💳 Integración Stripe</div>
          <span style="font-size:12px;background:#fef3c7;color:#92400e;padding:4px 12px;border-radius:100px;font-weight:600">⚠️ Pendiente de configurar</span>
        </div>
        <div style="padding:32px;max-width:600px">
          <div style="display:flex;flex-direction:column;gap:20px">
            <div style="padding:20px;background:var(--gray-50);border-radius:var(--radius);border:1.5px solid var(--gray-200)">
              <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);margin-bottom:12px">Estado actual</div>
              <div style="font-size:14px;color:var(--gray-600);line-height:1.7">
                Stripe Connect no está activo. Las transacciones son simuladas.<br/>
                Tarjeta de prueba: <code style="background:var(--gray-100);padding:2px 6px;border-radius:4px;font-size:13px">4242 4242 4242 4242</code>
              </div>
            </div>
            <div style="padding:20px;background:var(--gray-50);border-radius:var(--radius);border:1.5px solid var(--gray-200)">
              <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);margin-bottom:12px">Modelo de comisión</div>
              <div style="font-size:14px;color:var(--gray-600);line-height:1.9">
                Lotes ≥ 1.000€ → 3% comprador + 3% vendedor<br/>
                Lotes ≥ 500€ → 4% comprador + 4% vendedor<br/>
                Lotes &lt; 500€ → 5% comprador + 5% vendedor
              </div>
            </div>
            <div style="padding:20px;background:#fef3c7;border-radius:var(--radius);border:1.5px solid #fcd34d">
              <div style="font-size:14px;color:#92400e;font-weight:600;margin-bottom:8px">Pasos pendientes</div>
              <ul style="font-size:13px;color:#92400e;list-style:none;display:flex;flex-direction:column;gap:6px">
                <li>□ Añadir clave secreta de Stripe (STRIPE_SECRET_KEY)</li>
                <li>□ Configurar Stripe Connect para pagos a vendedores</li>
                <li>□ Activar modo live antes del lanzamiento público</li>
                <li>□ Webhook de confirmación de pago</li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <!-- SUPABASE -->
      <div id="tab-supabase" class="admin-card" style="display:none">
        <div class="admin-card-header">
          <div class="admin-card-title">🗄️ Integración Supabase</div>
          <span style="font-size:12px;background:#fef3c7;color:#92400e;padding:4px 12px;border-radius:100px;font-weight:600">⚠️ Pendiente de conectar</span>
        </div>
        <div style="padding:32px;max-width:600px">
          <div style="display:flex;flex-direction:column;gap:20px">
            <div style="padding:20px;background:var(--gray-50);border-radius:var(--radius);border:1.5px solid var(--gray-200)">
              <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);margin-bottom:12px">Estado actual</div>
              <div style="font-size:14px;color:var(--gray-600);line-height:1.7">
                Los datos se almacenan en <strong>localStorage</strong> (navegador). Cuando se conecte Supabase, migrarán a la base de datos.
              </div>
            </div>
            <div style="padding:20px;background:var(--gray-50);border-radius:var(--radius);border:1.5px solid var(--gray-200)">
              <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);margin-bottom:12px">Tablas a crear</div>
              <div style="display:flex;flex-direction:column;gap:6px">
                ${[['profiles','Perfiles de usuario, tipo de negocio y categorías'],['products','Productos y lotes publicados'],['categories','Árbol de categorías'],['conversations','Hilos de mensajería'],['messages','Mensajes en tiempo real'],['reviews','Reseñas y reputación'],['feedback','Respuestas post-transacción']].map(([t,d])=>`
                <div style="display:flex;gap:10px;font-size:13px;padding:8px;background:white;border-radius:6px;border:1px solid var(--gray-200)">
                  <code style="color:var(--navy);font-weight:700;min-width:120px">${t}</code>
                  <span style="color:var(--gray-500)">${d}</span>
                </div>`).join('')}
              </div>
            </div>
            <div style="padding:20px;background:#fef3c7;border-radius:var(--radius);border:1.5px solid #fcd34d">
              <div style="font-size:14px;color:#92400e;font-weight:600;margin-bottom:8px">Pasos pendientes</div>
              <ul style="font-size:13px;color:#92400e;list-style:none;display:flex;flex-direction:column;gap:6px">
                <li>□ Crear proyecto en supabase.com</li>
                <li>□ Añadir SUPABASE_URL y SUPABASE_ANON_KEY</li>
                <li>□ Crear las 7 tablas con sus relaciones</li>
                <li>□ Activar autenticación por email</li>
                <li>□ Activar Realtime para mensajería</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

function showTab(tab, btn) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).style.display = 'block';
  btn.classList.add('active');
}

function deleteProduct(id) {
  if (!confirm('¿Eliminar este lote?')) return;
  let saved = JSON.parse(localStorage.getItem('rs_products') || '[]');
  saved = saved.filter(p => p.id !== id);
  localStorage.setItem('rs_products', JSON.stringify(saved));
  showToast('Lote eliminado', 'success');
  renderAdmin();
}
</script>
</body>
</html>
